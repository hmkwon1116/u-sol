<style>

  .tabs {
    position: sticky; top: 0; z-index: 10;

    background: var(--card); border: 1px solid var(--line); border-radius: 14px;

  .term-card.open { border-color: var(--accent); }
  .term-card.dim { display: none; }

  .term-head {
    width: 100%; text-align: left; background: transparent; border: 0; cursor: pointer;
    padding: 16px 18px; display: flex; justify-content: space-between; align-items: center;
    gap: 14px; font-family: inherit; color: inherit;

  .term-head:hover { background: #faf9f5; }
  .term-card.open .term-head { background: #fdf4f0; }
  .term-name { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; line-height: 1.25; }
  .term-ko { font-size: 12px; color: var(--muted); margin-top: 2px; font-style: italic; font-family: 'Fraunces', serif; }
  .chevron {
    flex-shrink: 0; font-size: 18px; color: var(--muted);
    transition: transform .25s ease, color .15s;

  .term-card.open .chevron { transform: rotate(180deg); color: var(--accent); }

    max-height: 0; overflow: hidden;

  .term-card.open .term-body { max-height: 1400px; }
  .term-inner { padding: 0 18px 18px; }

  .row {
    margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--line);

  .row:first-child { margin-top: 0; padding-top: 0; border-top: 0; }
  .row-label {
    display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--accent);
    background: var(--accent-soft); padding: 3px 8px; border-radius: 5px;

  }
  .row-label.gray { color: var(--muted); background: #efece5; }
  .row-label.warm { color: #b25b1d; background: #fbe9d8; }
  .row-body { font-size: 14.5px; line-height: 1.65; color: var(--ink); }

  footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--line); font-size: 12px; color: var(--muted); text-align: center; }

  .reveal { opacity: 0; transform: translateY(8px); animation: rise .5s ease forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }

        },

          analogy: '자전거 타기 — 넘어지면 아프고(벌점), 잘 가면 기분 좋아서(보상) 자세를 점점 익히는 것.',
          why: 'AlphaGo·로봇·게임 AI의 핵심. RLHF로 LLM 정렬에도 쓰이고, 자율주행에서도 빠지지 않는 패러다임.'
        },
        {
          term: 'Self-Supervised Learning', ko: '자기 지도 학습',
          def: '데이터 자체에서 답을 만들어내(다음 단어 맞히기 등) 사람 라벨 없이 학습하는 방식.',
          analogy: '책의 한 부분을 가리고 "다음 단어 뭘까?" 스스로 묻고 답하며 공부하는 학생.',
          why: 'LLM 사전학습의 본질. 인터넷 텍스트 전체를 라벨 없이도 학습 데이터로 쓸 수 있게 만든 핵심 아이디어.'
        }
      ]
    }
  ];

  const tabRow = document.getElementById('tabRow');
  const groupsEl = document.getElementById('groups');
  const countPill = document.getElementById('countPill');
  const searchEl = document.getElementById('search');
  const emptyEl = document.getElementById('empty');

  const totalCount = DATA.reduce((n, c) => n + c.items.length, 0);
  countPill.textContent = `전체 ${totalCount}개 용어`;

  function makeTab(key, label, count, active) {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'tab' + (active ? ' active' : '');
    b.dataset.key = key;
    b.innerHTML = `${label}<span class="num">${count}</span>`;
    return b;
  }
  tabRow.appendChild(makeTab('all', '전체', totalCount, true));
  DATA.forEach(cat => tabRow.appendChild(makeTab(cat.key, cat.emoji + ' ' + cat.name, cat.items.length, false)));

  DATA.forEach((cat, gi) => {
    const sec = document.createElement('section');
    sec.className = 'cat-group reveal';
    sec.dataset.key = cat.key;
    sec.style.animationDelay = (0.15 + gi * 0.03) + 's';
    sec.innerHTML = `
      <div class="cat-head">
        <span class="emoji">${cat.emoji}</span>
        <div>
          <div class="nm">${cat.name}</div>
          <div class="nm-sub">${cat.sub} · ${cat.items.length}개</div>
        </div>
      </div>
      <div class="grid"></div>
    `;
    const grid = sec.querySelector('.grid');
    cat.items.forEach(it => {
      const card = document.createElement('div');
      card.className = 'term-card';
      card.dataset.haystack = (it.term + ' ' + it.ko + ' ' + it.def).toLowerCase();
      card.innerHTML = `
        <button type="button" class="term-head">
          <div>
            <div class="term-name">${it.term}</div>
            <div class="term-ko">${it.ko}</div>
          </div>
          <span class="chevron">⌄</span>
        </button>
        <div class="term-body">
          <div class="term-inner">
            <div class="row">
              <span class="row-label">정의</span>
              <div class="row-body">${it.def}</div>
            </div>
            <div class="row">
              <span class="row-label warm">쉬운 비유</span>
              <div class="row-body">${it.analogy}</div>
            </div>
            <div class="row">
              <span class="row-label gray">왜 중요한가</span>
              <div class="row-body">${it.why}</div>
            </div>
          </div>
        </div>
      `;
      const head = card.querySelector('.term-head');
      head.addEventListener('click', () => card.classList.toggle('open'));
      grid.appendChild(card);
    });
    groupsEl.appendChild(sec);
  });

  let currentKey = 'all';

  function applyFilters() {
    const q = (searchEl.value || '').trim().toLowerCase();
    let shown = 0;
    document.querySelectorAll('.cat-group').forEach(g => {
      const matchTab = (currentKey === 'all' || g.dataset.key === currentKey);
      let groupShown = 0;
      g.querySelectorAll('.term-card').forEach(card => {
        const matchSearch = !q || card.dataset.haystack.includes(q);
        const show = matchTab && matchSearch;
        card.classList.toggle('dim', !show);
        if (show) groupShown++;
      });
      g.classList.toggle('hidden', !matchTab || groupShown === 0);
      if (matchTab) shown += groupShown;
    });
    emptyEl.classList.toggle('hidden', shown > 0);
  }

  tabRow.addEventListener('click', (e) => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    currentKey = btn.dataset.key;
    applyFilters();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  searchEl.addEventListener('input', applyFilters);
</script>
</body>
</html>
