<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="네온 아케이드 스타일 자동차 레이싱. 키보드와 터치로 즐기는 한국어 웹 운전 게임.">
<meta name="theme-color" content="#0a0a12">
<title>NEON RACER · 네온 레이서</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@500;700;900&display=swap');
  :root {
    --bg: #0a0a12; --panel: #12121f; --accent: #00f0ff; --accent-2: #ff2d95;
    --text: #e8ecff; --muted: #7a82b8; --road: #15151f; --line: #f7f7e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(0,240,255,0.12), transparent 55%),
      radial-gradient(ellipse at 80% 120%, rgba(255,45,149,0.12), transparent 55%),
      var(--bg);
    color: var(--text); font-family: 'Orbitron', sans-serif;
    overflow: hidden; user-select: none;
  }
  body::after {
    content: ""; position: fixed; inset: 0;
    background: repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
    pointer-events: none; z-index: 100; mix-blend-mode: multiply;
  }
  .wrap { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 8px; }
  .back { position: fixed; top: 14px; left: 16px; z-index: 200; color: var(--muted); text-decoration: none; font-size: 13px; letter-spacing: 1px; }
  .title {
    font-family: 'Press Start 2P', monospace; font-size: clamp(13px, 3.6vw, 22px);
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 24px rgba(0,240,255,0.35); text-align: center;
  }
  .hud { display: flex; gap: 22px; font-size: 12px; letter-spacing: 1px; }
  .hud b { color: var(--accent); font-weight: 700; }
  .hud .best b { color: var(--accent-2); }
  .board-frame {
    position: relative; padding: 6px; border-radius: 10px;
    background: linear-gradient(145deg, rgba(0,240,255,0.5), rgba(255,45,149,0.5));
    box-shadow: 0 0 40px rgba(0,240,255,0.25), inset 0 0 20px rgba(0,0,0,0.6);
  }
  canvas#game { display: block; background: #07070e; border-radius: 6px; }
  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: rgba(10,10,18,0.9); backdrop-filter: blur(4px); border-radius: 6px;
    z-index: 10; text-align: center; padding: 20px;
  }
  .overlay.hidden { display: none; }
  .overlay .big {
    font-family: 'Press Start 2P', monospace; font-size: 15px; line-height: 1.8;
    color: var(--accent-2); text-shadow: 0 0 18px rgba(255,45,149,0.5);
  }
  .overlay .sub { font-size: 13px; color: var(--muted); line-height: 1.9; }
  .btn {
    font-family: 'Press Start 2P', monospace; font-size: 11px; color: #061015;
    background: linear-gradient(90deg, var(--accent), #6ef0ff); border: none;
    border-radius: 8px; padding: 14px 22px; cursor: pointer;
    box-shadow: 0 0 22px rgba(0,240,255,0.5);
  }
  .btn:active { transform: scale(0.96); }
  .touch { display: none; width: 100%; max-width: 380px; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .touch button {
    font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 20px; color: var(--text);
    background: var(--panel); border: 1px solid rgba(0,240,255,0.35); border-radius: 12px;
    padding: 18px 0; box-shadow: 0 0 14px rgba(0,240,255,0.12);
  }
  .touch button:active { transform: scale(0.94); background: rgba(0,240,255,0.15); }
  .touch .boost { border-color: rgba(255,45,149,0.5); color: var(--accent-2); }
  .hint { font-size: 11px; color: var(--muted); text-align: center; letter-spacing: .5px; }
  @media (max-width: 620px) { .touch { display: grid; } .hint { display: none; } }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/game/">← 게임</a>
  <div class="title">NEON RACER</div>
  <div class="hud">
    <div>SCORE <b id="score">0</b></div>
    <div>SPEED <b id="speed">1.0×</b></div>
    <div class="best">BEST <b id="best">0</b></div>
  </div>
  <div class="board-frame">
    <canvas id="game" width="360" height="560"></canvas>
    <div class="overlay" id="ovStart">
      <div class="big">READY?</div>
      <div class="sub">← → 좌우 이동 · ↑ 부스트<br>모바일은 아래 버튼을 사용하세요</div>
      <button class="btn" id="btnStart">START</button>
    </div>
    <div class="overlay hidden" id="ovOver">
      <div class="big">CRASH!</div>
      <div class="sub">SCORE <b id="finalScore" style="color:var(--accent)">0</b></div>
      <button class="btn" id="btnRetry">RETRY</button>
    </div>
  </div>
  <div class="touch">
    <button id="tL">◀</button>
    <button id="tB" class="boost">▲</button>
    <button id="tR">▶</button>
  </div>
  <div class="hint">← → 좌우 · ↑ 부스트 · 스페이스로 시작/재시작</div>
</div>

<script>
(() => {
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const elScore = document.getElementById('score');
  const elSpeed = document.getElementById('speed');
  const elBest = document.getElementById('best');
  const elFinal = document.getElementById('finalScore');
  const ovStart = document.getElementById('ovStart');
  const ovOver = document.getElementById('ovOver');

  const ROAD_X = 40, ROAD_W = W - 80;
  const LANES = 3;
  const LANE_W = ROAD_W / LANES;
  const CAR_W = 38, CAR_H = 64;

  const COLORS = ['#ff2d95', '#ffd93d', '#00f0ff', '#ff7a3d', '#9d6bff'];

  let state = 'ready';
  let score = 0;
  let best = +(localStorage.getItem('usol_racer_best') || 0);
  elBest.textContent = best;

  let player = { x: ROAD_X + ROAD_W/2 - CAR_W/2, y: H - CAR_H - 24, vx: 0 };
  let obstacles = [];
  let lineOffset = 0;
  let baseSpeed = 3.2;
  let speedMult = 1;
  let spawnTimer = 0;
  let boost = false;
  let keys = {};
  let lastTime = 0;
  let particles = [];

  function reset() {
    score = 0;
    speedMult = 1;
    player.x = ROAD_X + ROAD_W/2 - CAR_W/2;
    player.vx = 0;
    obstacles = [];
    particles = [];
    spawnTimer = 0;
    lineOffset = 0;
  }

  function start() {
    reset();
    state = 'play';
    ovStart.classList.add('hidden');
    ovOver.classList.add('hidden');
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

  function gameOver() {
    state = 'over';
    if (score > best) {
      best = score;
      localStorage.setItem('usol_racer_best', best);
      elBest.textContent = best;
    }
    elFinal.textContent = score;
    ovOver.classList.remove('hidden');
    for (let i = 0; i < 30; i++) {
      particles.push({
        x: player.x + CAR_W/2, y: player.y + CAR_H/2,
        vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
        life: 1, color: Math.random() > 0.5 ? '#ff2d95' : '#ffd93d'
      });
    }
  }

  function spawn() {
    const lane = Math.floor(Math.random() * LANES);
    const x = ROAD_X + lane * LANE_W + LANE_W/2 - CAR_W/2;
    obstacles.push({
      x, y: -CAR_H - 10,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      type: Math.random() < 0.15 ? 'truck' : 'car'
    });
  }

  function rectCollide(a, b) {
    return a.x < b.x + CAR_W && a.x + CAR_W > b.x &&
           a.y < b.y + (b.type === 'truck' ? CAR_H * 1.4 : CAR_H) &&
           a.y + CAR_H > b.y;
  }

  function update(dt) {
    if (state !== 'play') return;

    const targetVx = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
    player.vx += (targetVx * 6 - player.vx) * 0.25;
    player.x += player.vx;
    if (player.x < ROAD_X + 4) { player.x = ROAD_X + 4; player.vx = 0; }
    if (player.x > ROAD_X + ROAD_W - CAR_W - 4) { player.x = ROAD_X + ROAD_W - CAR_W - 4; player.vx = 0; }

    const speed = baseSpeed * speedMult * (boost ? 1.7 : 1);
    lineOffset = (lineOffset + speed) % 40;
    score += boost ? 2 : 1;
    elScore.textContent = score;
    speedMult = 1 + score / 2000;
    elSpeed.textContent = speedMult.toFixed(1) + '×';

    spawnTimer -= dt;
    const interval = Math.max(380, 900 - score / 8);
    if (spawnTimer <= 0) {
      spawn();
      if (score > 800 && Math.random() < 0.35) {
        const lane = Math.floor(Math.random() * LANES);
        const x = ROAD_X + lane * LANE_W + LANE_W/2 - CAR_W/2;
        const exists = obstacles.find(o => Math.abs(o.x - x) < 4 && o.y < 0);
        if (!exists) {
          obstacles.push({
            x, y: -CAR_H - 80,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            type: 'car'
          });
        }
      }
      spawnTimer = interval;
    }

    for (const o of obstacles) o.y += speed;
    obstacles = obstacles.filter(o => o.y < H + CAR_H);

    for (const o of obstacles) {
      if (rectCollide(player, o)) { gameOver(); return; }
    }
  }

  function drawRoad() {
    ctx.fillStyle = '#1c1830';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = 'var(--road)';
    ctx.fillStyle = '#15151f';
    ctx.fillRect(ROAD_X, 0, ROAD_W, H);

    ctx.strokeStyle = '#ff2d95';
    ctx.shadowColor = '#ff2d95';
    ctx.shadowBlur = 12;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(ROAD_X + 1, 0); ctx.lineTo(ROAD_X + 1, H);
    ctx.moveTo(ROAD_X + ROAD_W - 1, 0); ctx.lineTo(ROAD_X + ROAD_W - 1, H);
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.strokeStyle = 'rgba(247,247,232,0.7)';
    ctx.lineWidth = 4;
    ctx.setLineDash([22, 18]);
    ctx.lineDashOffset = -lineOffset;
    for (let i = 1; i < LANES; i++) {
      const x = ROAD_X + i * LANE_W;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    ctx.setLineDash([]);

    ctx.fillStyle = 'rgba(0,240,255,0.04)';
    for (let i = 0; i < 8; i++) {
      const y = ((i * 80) + lineOffset * 2) % H;
      ctx.fillRect(0, y, ROAD_X, 2);
      ctx.fillRect(ROAD_X + ROAD_W, y, ROAD_X, 2);
    }
  }

  function drawCar(x, y, color, isPlayer, isTruck) {
    const h = isTruck ? CAR_H * 1.4 : CAR_H;
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = isPlayer ? 18 : 10;

    ctx.fillStyle = color;
    roundRect(x, y, CAR_W, h, 7); ctx.fill();

    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(10,10,30,0.85)';
    roundRect(x + 5, y + 8, CAR_W - 10, h * 0.32, 3); ctx.fill();
    roundRect(x + 5, y + h - h * 0.32 - 8, CAR_W - 10, h * 0.28, 3); ctx.fill();

    ctx.fillStyle = '#222';
    ctx.fillRect(x - 3, y + 6, 4, 12);
    ctx.fillRect(x + CAR_W - 1, y + 6, 4, 12);
    ctx.fillRect(x - 3, y + h - 18, 4, 12);
    ctx.fillRect(x + CAR_W - 1, y + h - 18, 4, 12);

    if (isPlayer) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + 4, y + 2, 6, 3);
      ctx.fillRect(x + CAR_W - 10, y + 2, 6, 3);
      if (boost) {
        ctx.fillStyle = '#ffd93d';
        ctx.beginPath();
        ctx.moveTo(x + CAR_W/2 - 6, y + h);
        ctx.lineTo(x + CAR_W/2, y + h + 18 + Math.random() * 6);
        ctx.lineTo(x + CAR_W/2 + 6, y + h);
        ctx.closePath(); ctx.fill();
      }
    } else {
      ctx.fillStyle = '#ff5555';
      ctx.fillRect(x + 4, y + h - 5, 6, 3);
      ctx.fillRect(x + CAR_W - 10, y + h - 5, 6, 3);
    }
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawParticles() {
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.15; p.life -= 0.02;
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillRect(p.x, p.y, 4, 4);
    }
    ctx.globalAlpha = 1;
    particles = particles.filter(p => p.life > 0);
  }

  function render() {
    drawRoad();
    for (const o of obstacles) drawCar(o.x, o.y, o.color, false, o.type === 'truck');
    if (state !== 'over') drawCar(player.x, player.y, '#00f0ff', true, false);
    drawParticles();
  }

  function loop(now) {
    const dt = Math.min(50, now - lastTime);
    lastTime = now;
    update(dt);
    render();
    if (state === 'play' || particles.length > 0) requestAnimationFrame(loop);
  }

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') boost = true;
    if (e.key === ' ' || e.key === 'Enter') {
      if (state === 'ready' || state === 'over') start();
    }
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') boost = false;
  });

  const bindBtn = (id, on, off) => {
    const el = document.getElementById(id);
    const o = (e) => { e.preventDefault(); on(); };
    const f = (e) => { e.preventDefault(); off(); };
    el.addEventListener('touchstart', o, {passive: false});
    el.addEventListener('touchend', f);
    el.addEventListener('touchcancel', f);
    el.addEventListener('mousedown', o);
    el.addEventListener('mouseup', f);
    el.addEventListener('mouseleave', f);
  };
  bindBtn('tL', () => keys.left = true, () => keys.left = false);
  bindBtn('tR', () => keys.right = true, () => keys.right = false);
  bindBtn('tB', () => boost = true, () => boost = false);

  document.getElementById('btnStart').addEventListener('click', start);
  document.getElementById('btnRetry').addEventListener('click', start);

  render();
})();
</script>
</body>
</html>
