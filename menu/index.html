  // ─────────────────────────────────────────────────────────────
  // 날짜, 날씨, 트렌드 표시
  // ─────────────────────────────────────────────────────────────
  function fmtDate(d) {
    const days = ['일','월','화','수','목','금','토'];
    return `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}. (${days[d.getDay()]})`;
  }
  document.getElementById('dateNow').textContent = fmtDate(new Date());

  function getQuickPosition() {
    return new Promise(resolve => {
      if (!navigator.geolocation) { resolve(null); return; }
      let done = false;
      const finish = v => { if (!done) { done = true; resolve(v); } };
      navigator.geolocation.getCurrentPosition(
        p => finish({ lat: p.coords.latitude, lon: p.coords.longitude }),
        () => finish(null),
        { enableHighAccuracy: false, timeout: 4000, maximumAge: 10 * 60 * 1000 }
      );
      setTimeout(() => finish(null), 4500);
    });
  }

  // 날씨에 따라 카테고리 결정
  function categorize(temp, rainProb) {
    if (rainProb != null && rainProb >= 60) return 'rainy';
    if (temp == null) return 'mild';
    if (temp >= 26) return 'hot';
    if (temp <= 8) return 'cold';
    return 'mild';
  }

  const STATE = { category: 'mild', pairIndex: 0, lastTemp: null, lastRain: null };

  async function loadWeather() {
    let lat = 37.5665, lon = 126.9780, tz = 'Asia%2FSeoul';
    const pos = await getQuickPosition();
    if (pos) { lat = pos.lat; lon = pos.lon; tz = 'auto'; }
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&daily=precipitation_probability_max,temperature_2m_max,temperature_2m_min&timezone=${tz}&forecast_days=1`;
      const res = await fetch(url);
      const data = await res.json();
      const c = data.current;
      const d = data.daily;
      const t = Math.round(c.temperature_2m);
      const rain = d.precipitation_probability_max[0];
      STATE.lastTemp = t;
      STATE.lastRain = rain;
      document.getElementById('wxTemp').textContent = `${t}℃`;
      document.getElementById('wxRain').textContent = (rain != null ? `강수 ${rain}%` : '강수 정보 없음');
      STATE.category = categorize(t, rain);
      pickPair();
    } catch (e) {
      document.getElementById('wxTemp').textContent = '날씨 정보 없음';
      document.getElementById('wxRain').textContent = '—';
      STATE.category = 'mild';
      pickPair();
    }
  }

  function pickPair() {
    const list = PAIRS[STATE.category] || PAIRS.mild;
    const days = Math.floor(Date.now() / 86400000);
    STATE.pairIndex = ((days % list.length) + list.length) % list.length;
    render();
  }

  function pickOther() {
    const list = PAIRS[STATE.category] || PAIRS.mild;
    if (list.length <= 1) {
      // 다른 카테고리에서 임의 선택
      const cats = Object.keys(PAIRS).filter(c => c !== STATE.category);
      STATE.category = cats[Math.floor(Math.random() * cats.length)];
      const otherList = PAIRS[STATE.category];
      STATE.pairIndex = Math.floor(Math.random() * otherList.length);
    } else {
      STATE.pairIndex = (STATE.pairIndex + 1) % list.length;
    }
    render();
  }

  function dishCard(d, kind) {
    const label = kind === 'h' ? '🥬 건강식' : '🍔 비건강식';
    const ing = d.ingredients.map(i => `<li>${i}</li>`).join('');
    const steps = d.steps.map(s => `<li>${s}</li>`).join('');
    return `
      <div class="ver ${kind}">
        <span class="badge">${label}</span>
        <div class="dish"><span class="emoji">${d.emoji}</span>${d.name}</div>
        <div class="tag">${d.tag}</div>
        <div class="stats">
          <div class="stat"><span class="sk">대략 열량</span><span class="sv">${d.kcal}</span></div>
          <div class="stat"><span class="sk">조리 시간</span><span class="sv">${d.time}</span></div>
          <div class="stat"><span class="sk">난이도</span><span class="sv">${d.level}</span></div>
        </div>
        <div class="section-title">재료 (1인분 기준)</div>
        <ul class="ing">${ing}</ul>
        <div class="section-title">만드는 법</div>
        <ol class="steps">${steps}</ol>
        <div class="tip">💡 ${d.tip}</div>
      </div>
    `;
  }

  function render() {
    const list = PAIRS[STATE.category] || PAIRS.mild;
    const pair = list[STATE.pairIndex];
    document.getElementById('trendTag').textContent = pair.trend;
    const wrap = document.getElementById('pair');
    wrap.style.opacity = 0;
    setTimeout(() => {
      wrap.innerHTML = dishCard(pair.healthy, 'h') + dishCard(pair.bad, 'b');
      wrap.style.transition = 'opacity .3s ease';
      wrap.style.opacity = 1;
    }, 100);
  }

  document.getElementById('todayBtn').addEventListener('click', () => {
    if (STATE.lastTemp != null) STATE.category = categorize(STATE.lastTemp, STATE.lastRain);
    pickPair();
  });
  document.getElementById('otherBtn').addEventListener('click', pickOther);

  loadWeather();
</script>
