<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="내 주변 맛집 찾기 — 현재 위치 기준으로 구글맵에서 바로 검색.">
<meta name="theme-color" content="#fbfaf7">
<title>주변 맛집 찾기 · U-SOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbfaf7; --ink: #1a1916; --muted: #7c776c; --line: #e8e4db;
    --card: #ffffff; --accent: #d6452a; --accent-soft: #fbeae5;
    --shadow: 0 1px 2px rgba(26,25,22,0.04), 0 8px 24px rgba(26,25,22,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'Spline Sans', system-ui, sans-serif; line-height: 1.5;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  .back { position: fixed; top: 16px; left: 18px; color: var(--muted); text-decoration: none; font-size: 13px; letter-spacing: .04em; }
  .back:hover { color: var(--accent); }
  .wrap { max-width: 620px; margin: 0 auto; padding: 64px 22px 70px; }
  .crumb { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  .crumb a { color: var(--accent); text-decoration: none; }
  h1 { font-family: 'Fraunces', serif; font-size: clamp(28px, 6vw, 40px); font-weight: 900; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
  .desc { color: var(--muted); margin-top: 8px; font-size: 15px; padding-bottom: 24px; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
  .loc-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 24px; }
  .loc-status { font-size: 14px; color: var(--muted); margin-bottom: 12px; }
  .loc-status strong { color: var(--ink); font-weight: 600; }
  .loc-status.ok strong { color: var(--accent); }
  .locBtn {
    font-family: 'Spline Sans', sans-serif; font-size: 15px; font-weight: 600;
    color: #fff; background: var(--accent); border: none; border-radius: 12px;
    padding: 13px 20px; cursor: pointer; width: 100%; transition: all .15s;
  }
  .locBtn:hover { filter: brightness(1.05); }
  .locBtn:active { transform: scale(0.98); }
  .label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 600; margin: 0 0 12px 2px; }
  .cats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media (min-width: 520px) { .cats { grid-template-columns: repeat(3, 1fr); } }
  .food {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 20px 14px; text-align: center; cursor: pointer; box-shadow: var(--shadow);
    transition: transform .15s, box-shadow .15s, border-color .15s; user-select: none;
  }
  .food:hover { transform: translateY(-3px); box-shadow: 0 2px 4px rgba(26,25,22,0.05), 0 14px 30px rgba(26,25,22,0.1); border-color: #d8d2c6; }
  .food:active { transform: scale(0.97); }
  .food .emoji { font-size: 30px; display: block; margin-bottom: 8px; }
  .food .nm { font-size: 15px; font-weight: 600; }
  .manual { margin-top: 26px; }
  .manual input {
    width: 100%; font-family: 'Spline Sans', sans-serif; font-size: 15px;
    padding: 13px 16px; border: 1px solid var(--line); border-radius: 12px;
    background: var(--card); color: var(--ink); margin-bottom: 10px;
  }
  .manual input:focus { outline: none; border-color: var(--accent); }
  .note { margin-top: 26px; font-size: 12.5px; color: var(--muted); line-height: 1.8; }
  footer { text-align: center; padding: 24px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--line); margin-top: 30px; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <a class="back" href="/">← U-SOL</a>
  <div class="wrap">
    <div class="crumb"><a href="/">U-SOL</a> · 주변 맛집</div>
    <h1>🍜 주변 맛집 찾기</h1>
    <p class="desc">현재 위치를 잡으면, 누른 카테고리를 구글맵에서 내 주변으로 바로 검색해드려요.</p>

    <div class="loc-card">
      <div class="loc-status" id="locStatus">📍 아직 위치를 모르고 있어요. 아래 버튼을 눌러 현재 위치를 잡아보세요.</div>
      <button class="locBtn" id="locBtn">내 위치 찾기</button>
    </div>

    <p class="label">카테고리</p>
    <div class="cats" id="cats">
      <div class="food" data-q="맛집"><span class="emoji">🍽️</span><span class="nm">맛집</span></div>
      <div class="food" data-q="카페"><span class="emoji">☕</span><span class="nm">카페</span></div>
      <div class="food" data-q="술집"><span class="emoji">🍺</span><span class="nm">술집</span></div>
      <div class="food" data-q="고깃집"><span class="emoji">🥩</span><span class="nm">고깃집</span></div>
      <div class="food" data-q="일식"><span class="emoji">🍣</span><span class="nm">일식</span></div>
      <div class="food" data-q="디저트"><span class="emoji">🍰</span><span class="nm">디저트</span></div>
      <div class="food" data-q="뷔페"><span class="emoji">🍱</span><span class="nm">뷔페</span></div>
    </div>

    <div class="manual">
      <p class="label">직접 검색</p>
      <input type="text" id="manualInput" placeholder="예: 파스타, 마라탕, 브런치…">
      <button class="locBtn" id="manualBtn">이 키워드로 주변 검색</button>
    </div>

    <p class="note">위치를 잡지 않아도 카테고리를 누르면 구글맵에서 검색돼요. 위치를 허용하면 '내 주변'으로 더 정확하게 찾아줘요. 위치 정보는 이 기기 안에서만 쓰이고 어디에도 저장되지 않아요.</p>
  </div>
  <footer>© 2026 U-SOL · <a href="/">메인으로</a></footer>

<script>
  let coords = null;
  const statusEl = document.getElementById('locStatus');
  document.getElementById('locBtn').addEventListener('click', () => {
    if (!navigator.geolocation) {
      statusEl.textContent = '이 브라우저는 위치 기능을 지원하지 않아요. 직접 검색을 이용해보세요.';
      return;
    }
    statusEl.innerHTML = '📡 위치를 찾는 중…';
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        statusEl.className = 'loc-status ok';
        statusEl.innerHTML = '✅ <strong>현재 위치를 찾았어요!</strong> 이제 카테고리를 누르면 내 주변으로 검색돼요.';
      },
      (err) => {
        statusEl.textContent = '위치를 가져오지 못했어요. 권한을 허용했는지 확인하거나, 직접 검색을 이용해보세요.';
      },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  });
  function search(query) {
    let url;
    if (coords) {
      url = `https://www.google.com/maps/search/${encodeURIComponent(query)}/@${coords.lat},${coords.lng},16z`;
    } else {
      url = `https://www.google.com/maps/search/${encodeURIComponent(query)}`;
    }
    window.open(url, '_blank');
  }
  document.getElementById('cats').addEventListener('click', (e) => {
    const card = e.target.closest('.food');
    if (!card) return;
    search(card.getAttribute('data-q'));
  });
  document.getElementById('manualBtn').addEventListener('click', () => {
    const v = document.getElementById('manualInput').value.trim();
    if (v) search(v);
  });
  document.getElementById('manualInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { const v = e.target.value.trim(); if (v) search(v); }
  });
</script>
</body>
</html>
