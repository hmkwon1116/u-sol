<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="U-SOL 사이트에 오신 것을 환영합니다. 다양한 아이디어를 만들고 실험하는 공간으로 안내합니다.">
<meta name="theme-color" content="#fbfaf7">
<title>환영합니다 · U-SOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbfaf7; --ink: #1a1916; --muted: #7c776c; --line: #e8e4db;
    --card: #ffffff; --accent: #d6452a; --accent-soft: #fbeae5;
    --shadow: 0 1px 2px rgba(26,25,22,0.04), 0 8px 24px rgba(26,25,22,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'Spline Sans', system-ui, sans-serif; line-height: 1.55;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 18px;
  }
  .wrap { max-width: 560px; width: 100%; text-align: center; }
  .badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); background: var(--accent-soft);
    padding: 6px 14px; border-radius: 999px; margin-bottom: 22px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(34px, 7vw, 52px); font-weight: 900;
    letter-spacing: -0.02em; line-height: 1.05;
    margin-bottom: 14px;
  }
  h1 .dot { color: var(--accent); }
  .lead {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: clamp(15px, 2.4vw, 18px); color: var(--muted);
    margin-bottom: 30px;
  }
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 20px; padding: 24px 22px;
    box-shadow: var(--shadow); text-align: left;
    margin-bottom: 22px;
  }
  .card h2 {
    font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600;
    margin-bottom: 10px;
  }
  .card p {
    font-size: 14.5px; color: var(--muted); line-height: 1.6;
  }
  .cta {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--ink); color: #fff;
    font-family: 'Spline Sans', system-ui, sans-serif;
    font-size: 15px; font-weight: 600;
    padding: 13px 26px; border-radius: 999px;
    text-decoration: none; box-shadow: var(--shadow);
    transition: transform .15s, background .15s;
  }
  .cta:hover { transform: translateY(-1px); background: var(--accent); }
  .cta .arrow { transition: transform .2s; }
  .cta:hover .arrow { transform: translateX(3px); }
  .quick {
    margin-top: 26px; display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
  }
  .quick a {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 999px; padding: 7px 13px;
    font-size: 12.5px; color: var(--ink); text-decoration: none;
    transition: border-color .15s, transform .15s;
  }
  .quick a:hover { border-color: var(--accent); transform: translateY(-1px); }
  footer {
    margin-top: 30px; font-size: 11.5px; color: var(--muted);
  }
  .reveal { opacity: 0; transform: translateY(8px); animation: rise .45s ease forwards; }
  .reveal.d1 { animation-delay: .08s; }
  .reveal.d2 { animation-delay: .16s; }
  .reveal.d3 { animation-delay: .24s; }
  .reveal.d4 { animation-delay: .32s; }
  @keyframes rise { to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div class="wrap">
  <span class="badge reveal">Welcome</span>
  <h1 class="reveal d1">U-SOL<span class="dot">.</span></h1>
  <p class="lead reveal d2">다양한 아이디어를 만들고 실험하는 공간</p>

  <div class="card reveal d3">
    <h2>처음 방문하셨나요?</h2>
    <p>날씨·환율·오늘의 말씀부터 직접 만든 도구와 게임까지 — 매일 새로워지는 콘텐츠를 한 페이지에서 만나보세요.</p>
  </div>

  <a class="cta reveal d4" href="/">
    메인으로 들어가기 <span class="arrow">→</span>
  </a>

  <div class="quick reveal d4">
    <a href="/verse/">🕊️ 오늘의 말씀</a>
    <a href="/english/">🗣️ 영어 한마디</a>
    <a href="/ai/">🤖 AI 지식</a>
    <a href="/weather/">🌡️ 날씨</a>
    <a href="/fx/">💱 환율</a>
  </div>

  <footer class="reveal d4">© U-SOL · 매일 한 입씩</footer>
</div>
</body>
</html>
