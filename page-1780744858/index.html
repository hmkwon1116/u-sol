<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>콘텐츠 오른쪽 정렬 · U-SOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f5fc;
    --ink: #1a1916;
    --muted: #7a7770;
    --line: #e3e9f2;
    --card: #ffffff;
    --accent: #d6452a;
    --accent-soft: #fce7e0;
    --shadow: 0 1px 2px rgba(26,25,22,0.03), 0 4px 14px rgba(26,25,22,0.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: linear-gradient(180deg, #eef4fc 0%, #f6f9fd 60%, #ffffff 100%);
    color: var(--ink);
    font-family: 'Spline Sans', system-ui, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* full-width wrapper so we can push to the very right edge */
  .page {
    width: 100%;
    padding: 14px 16px 32px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
  }

  .back {
    align-self: flex-end;
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
  }
  .back:hover { color: var(--accent); }

  .head {
    text-align: right;
    max-width: 560px;
  }
  .head .logo {
    font-family: 'Fraunces', serif; font-weight: 900;
    font-size: clamp(26px, 5vw, 36px); letter-spacing: -0.02em; line-height: 1;
  }
  .head .logo .dot { color: var(--accent); }
  .head .tagline {
    font-family: 'Fraunces', serif; font-size: 13px;
    font-style: italic; color: var(--muted); margin-top: 4px;
  }

  /* main content card pinned to right edge */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
    max-width: 520px;
    width: 100%;
    text-align: right;
  }
  .card h1 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.25;
  }
  .card p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }
  .card .accent { color: var(--accent); font-weight: 600; }

  .meta {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }
  .meta .k {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    margin-right: 4px;
  }

  footer {
    width: 100%;
    margin-top: 6px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  .reveal { opacity: 0; transform: translateY(6px); animation: rise .35s ease forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div class="page">
  <a class="back reveal" href="/">← U-SOL</a>

  <div class="head reveal" style="animation-delay:.05s">
    <div class="logo">우측 정렬<span class="dot">.</span></div>
    <div class="tagline">content pushed to the far right edge</div>
  </div>

  <div class="card reveal" style="animation-delay:.1s">
    <div class="meta"><span class="k">레이아웃</span>오른쪽 끝 정렬</div>
    <h1>콘텐츠를 화면 맨 오른쪽 끝으로 정렬했습니다</h1>
    <p>
      모든 요소가 <span class="accent">화면의 오른쪽 가장자리</span>에 붙어 있습니다.
      텍스트는 우측 정렬, 카드와 버튼은 우측 끝에 배치되어,
      왼쪽 여백이 자연스럽게 비어 있는 비대칭 레이아웃입니다.
    </p>
  </div>

  <footer class="reveal" style="animation-delay:.2s">
    <span>© 2026 U-SOL · 우측 정렬 실험</span>
  </footer>
</div>
</body>
</html>
