<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="오늘의 말씀 여러 구절 — 매일 다른 말씀이 중복 없이 함께 펼쳐집니다.">
<meta name="theme-color" content="#f4efe6">
<title>오늘의 말씀 모음 · U-SOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4efe6; --bg2: #efe8da; --ink: #3a352c; --muted: #8c8472;
    --accent: #9a7b4f; --line: #e0d7c6; --card: #fffdf8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 0%, #faf6ee, transparent 60%), linear-gradient(180deg, var(--bg), var(--bg2));
    color: var(--ink); font-family: 'Noto Serif KR', serif;
    display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;
  }
  .back { position: fixed; top: 18px; left: 20px; color: var(--muted); text-decoration: none; font-size: 14px; letter-spacing: .04em; z-index: 5; }
  .back:hover { color: var(--accent); }
  .wrap {
    flex: 1; max-width: 680px; margin: 0 auto; width: 100%;
    padding: 76px 22px 60px; display: flex; flex-direction: column;
    align-items: center; text-align: center;
  }
  .date { font-size: 14px; color: var(--muted); letter-spacing: .1em; margin-bottom: 8px; }
  .eyebrow {
    font-family: 'Gowun Batang', serif; font-size: 15px; color: var(--accent);
    letter-spacing: .25em; margin-bottom: 12px; position: relative;
  }
  h1 {
    font-family: 'Gowun Batang', serif; font-size: clamp(22px, 5.5vw, 28px);
    font-weight: 700; letter-spacing: -0.01em; margin-bottom: 8px;
  }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 36px; letter-spacing: .04em; }
  .list { width: 100%; display: flex; flex-direction: column; gap: 18px; margin-bottom: 30px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    padding: 26px 24px 22px; text-align: left;
    box-shadow: 0 4px 18px rgba(120,100,60,0.07);
    opacity: 0; transform: translateY(10px);
    animation: rise .55s ease forwards;
  }
  .card .idx {
    font-family: 'Gowun Batang', serif; font-size: 12px; color: var(--accent);
    letter-spacing: .2em; margin-bottom: 10px;
  }
  .card .t {
    font-family: 'Gowun Batang', serif; font-size: clamp(17px, 4.2vw, 21px);
    line-height: 1.85; font-weight: 400; word-break: keep-all; margin-bottom: 14px;
  }
  .card .r { font-size: 14px; color: var(--accent); font-weight: 600; letter-spacing: .05em; }
  @keyframes rise { to { opacity: 1; transform: none; } }
  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  button {
    font-family: 'Noto Serif KR', serif; font-size: 14px; color: var(--ink);
    background: var(--card); border: 1px solid var(--line); border-radius: 999px;
    padding: 12px 22px; cursor: pointer; letter-spacing: .04em; transition: all .15s;
    box-shadow: 0 2px 10px rgba(120,100,60,0.06);
  }
  button:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  .note { margin-top: 30px; font-size: 12.5px; color: var(--muted); line-height: 1.8; max-width: 460px; opacity: .85; }
  footer { text-align: center; padding: 22px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--line); }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <a class="back" href="/">← U-SOL</a>
  <div class="wrap">
    <div class="date" id="date">—</div>
    <div class="eyebrow">오늘의 말씀 모음</div>
    <h1>여러 말씀, 한 번에</h1>
    <p class="subtitle">매일 6구절이 중복 없이 함께 펼쳐집니다</p>
    <div class="list" id="list"></div>
    <div class="actions">
      <button id="todayBtn">오늘의 묶음</button>
      <button id="shuffleBtn">다른 묶음 보기</button>
      <button id="copyBtn">모두 복사</button>
    </div>
    <p class="note">한 번에 한 구절이 아쉬울 때, 여러 말씀을 한 화면에 모아 펼쳐봅니다. 같은 날에는 같은 구절이 두 번 나오지 않습니다.</p>
  </div>
  <footer>© 2026 U-SOL · <a href="/">메인으로</a> · <a href="/verse/">한 구절 보기</a></footer>
<script>
  const VERSES = [
    { t: "여호와는 나의 목자시니 내게 부족함이 없으리로다", r: "시편 23:1" },
    { t: "수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라", r: "마태복음 11:28" },
    { t: "두려워하지 말라 내가 너와 함께 함이라 놀라지 말라 나는 네 하나님이 됨이라", r: "이사야 41:10" },
    { t: "범사에 감사하라 이것이 그리스도 예수 안에서 너희를 향하신 하나님의 뜻이니라", r: "데살로니가전서 5:18" },
    { t: "내게 능력 주시는 자 안에서 내가 모든 것을 할 수 있느니라", r: "빌립보서 4:13" },
    { t: "너희 염려를 다 주께 맡기라 이는 그가 너희를 돌보심이라", r: "베드로전서 5:7" },
    { t: "마음을 다하여 여호와를 신뢰하고 네 명철을 의지하지 말라", r: "잠언 3:5" },
    { t: "여호와를 기뻐하라 그가 네 마음의 소원을 네게 이루어 주시리로다", r: "시편 37:4" },
    { t: "하나님이 세상을 이처럼 사랑하사 독생자를 주셨으니", r: "요한복음 3:16" },
    { t: "내가 너희에게 평안을 끼치노니 곧 나의 평안을 너희에게 주노라", r: "요한복음 14:27" },
    { t: "쉬지 말고 기도하라", r: "데살로니가전서 5:17" },
    { t: "오직 여호와를 앙망하는 자는 새 힘을 얻으리니 독수리가 날개치며 올라감 같을 것이요", r: "이사야 40:31" },
    { t: "사랑은 오래 참고 사랑은 온유하며 시기하지 아니하며 자랑하지 아니하며 교만하지 아니하며", r: "고린도전서 13:4" },
    { t: "너희는 먼저 그의 나라와 그의 의를 구하라 그리하면 이 모든 것을 너희에게 더하시리라", r: "마태복음 6:33" },
    { t: "내가 네게 명령한 것이 아니냐 강하고 담대하라 두려워하지 말며 놀라지 말라", r: "여호수아 1:9" },
    { t: "여호와는 나의 빛이요 나의 구원이시니 내가 누구를 두려워하리요", r: "시편 27:1" },
    { t: "주의 말씀은 내 발에 등이요 내 길에 빛이니이다", r: "시편 119:105" },
    { t: "여호와께서 너를 지키시며 네 영혼을 지키시리로다", r: "시편 121:7" },
    { t: "근심이 사람의 마음에 있으면 그것으로 번뇌하게 되나 선한 말은 그것을 즐겁게 하느니라", r: "잠언 12:25" },
    { t: "오직 성령의 열매는 사랑과 희락과 화평과 오래 참음과 자비와 양선과 충성과 온유와 절제니", r: "갈라디아서 5:22-23" },
    { t: "나의 도움이 어디서 올까 나의 도움은 천지를 지으신 여호와에게서로다", r: "시편 121:1-2" },
    { t: "아무 것도 염려하지 말고 다만 모든 일에 기도와 간구로 너희 구할 것을 감사함으로 하나님께 아뢰라", r: "빌립보서 4:6" },
    { t: "우리가 알거니와 하나님을 사랑하는 자 곧 그의 뜻대로 부르심을 입은 자들에게는 모든 것이 합력하여 선을 이루느니라", r: "로마서 8:28" },
    { t: "여호와는 마음이 상한 자를 가까이 하시고 충심으로 통회하는 자를 구원하시는도다", r: "시편 34:18" }
  ];

  const COUNT = 6;
  const dateEl = document.getElementById('date');
  const listEl = document.getElementById('list');

  function dayNumber(d) {
    return Math.floor(d.getTime() / 86400000);
  }

  // deterministic xmur3-style hash → number generator from a seed
  function seededRand(seed) {
    let h = 2166136261 ^ seed;
    return function () {
      h += (h << 13); h ^= (h >>> 7);
      h += (h << 3);  h ^= (h >>> 17);
      h += (h << 5);
      return ((h >>> 0) % 1_000_000) / 1_000_000;
    };
  }

  // Fisher-Yates with a seeded PRNG → unique picks, no duplicates
  function pickUnique(seed, count) {
    const rand = seededRand(seed);
    const pool = VERSES.map((_, i) => i);
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, Math.min(count, pool.length));
  }

  function render(indexes) {
    listEl.innerHTML = '';
    indexes.forEach((vi, i) => {
      const v = VERSES[vi];
      const card = document.createElement('article');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.08}s`;
      card.innerHTML = `
        <div class="idx">No. ${String(i + 1).padStart(2, '0')}</div>
        <blockquote class="t">${v.t}</blockquote>
        <div class="r">${v.r}</div>`;
      listEl.appendChild(card);
    });
  }

  function showToday() {
    const now = new Date();
    const days = ['일','월','화','수','목','금','토'];
    dateEl.textContent = `${now.getFullYear()}. ${now.getMonth()+1}. ${now.getDate()}. (${days[now.getDay()]})`;
    render(pickUnique(dayNumber(now), COUNT));
  }

  function showShuffle() {
    // a new seed each click → fresh unique combination, never duplicates within one set
    const seed = Math.floor(Math.random() * 2_147_483_647);
    render(pickUnique(seed, COUNT));
  }

  document.getElementById('todayBtn').addEventListener('click', showToday);
  document.getElementById('shuffleBtn').addEventListener('click', showShuffle);
  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = Array.from(listEl.querySelectorAll('.card'))
      .map(c => `${c.querySelector('.t').textContent.trim()} (${c.querySelector('.r').textContent.trim()})`)
      .join('\n\n');
    navigator.clipboard?.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      const old = btn.textContent; btn.textContent = '복사됨';
      setTimeout(() => btn.textContent = old, 1400);
    });
  });

  showToday();
</script>
</body>
</html>
