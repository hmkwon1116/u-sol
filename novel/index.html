<style>
  :root {
    --bg: #16161d; --bg2: #1c1c26; --ink: #e8e6e0; --soft: #b8b4ad;

    background: var(--bg); color: var(--ink);

  .back { position: fixed; top: 16px; left: 18px; color: var(--muted); text-decoration: none; font-size: 13px; letter-spacing: .04em; z-index: 20; }
  .back:hover { color: var(--accent); }
  .toolbar { position: fixed; top: 12px; right: 16px; z-index: 20; display: flex; gap: 8px; }

    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--soft);

    padding: 7px 12px; cursor: pointer; transition: all .15s;

  .ep { font-family: 'Nanum Myeongjo', serif; font-size: 18px; color: var(--soft); margin-bottom: 8px; }
  .meta { font-size: 13px; color: var(--muted); padding-bottom: 28px; margin-bottom: 24px; border-bottom: 1px solid var(--line); }

  .picker { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 32px; }
  .picker button {
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
    background: var(--card); border: 1px solid var(--line); color: var(--soft);
    border-radius: 999px; padding: 6px 12px; cursor: pointer; transition: all .15s;
  }
  .picker button:hover { color: var(--accent); border-color: var(--accent); }
  .picker button.on { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }

  .story { font-size: var(--fs, 17px); line-height: 2.0; color: var(--ink); transition: font-size .2s; }

  .story .dia { color: var(--ink); }
  .story .scene { text-align: center; color: var(--muted); margin: 2.4em 0; letter-spacing: .3em; }
  .story em { color: var(--accent); font-style: normal; font-weight: 500; }

  .nav { display: flex; justify-content: space-between; gap: 12px; margin-top: 56px; padding-top: 28px; border-top: 1px solid var(--line); }
  .nav button, .nav span {
    flex: 1; text-align: center; padding: 14px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--card); color: var(--soft);

  .endnote { margin-top: 40px; padding: 20px; background: var(--bg2); border: 1px solid var(--line); border-radius: 14px; font-size: 13.5px; color: var(--muted); line-height: 1.8; }

<script>
const EPS = [
  {
    title: "빈 의자",
    body: `
      <p>월요일 아침, 서진우는 자기 자리가 아닌 곳에 앉아 있었다.</p>
      <p>창가 쪽, 파티션이 한 뼘 더 높은 자리. 지난주까지 김 팀장이 쓰던 책상이었다. 김 팀장은 갑작스럽게 다른 본부로 옮겨갔고, 인사 발령 메일 한 통과 함께 진우는 '플랫폼개발팀 팀장'이 되었다. 입사 7년 차, 서른넷. 누군가에겐 늦었고 누군가에겐 일렀다.</p>
      <p>의자는 그대로인데 등받이가 낯설었다. 진우는 모니터를 켜며 생각했다. <em>나는 어제까지 코드를 짜던 사람인데, 오늘부터는 무엇을 짜는 사람이지.</em></p>
      <p class="scene">· · ·</p>
      <p>첫 주는 조용히 지나가지 않았다. 수요일 오후, 운영 중인 추천 서비스에서 장애가 터졌다. 신규 모델을 배포한 직후였고, 하필 진우가 팀장이 되기 전 마지막으로 리뷰했던 코드였다. 응답 지연이 치솟았고, 고객사 세 곳에서 연달아 항의가 들어왔다.</p>
      <p>팀원 다섯 명의 시선이 일제히 진우에게 모였다. 그 시선에는 질문이 담겨 있었다. <em>이제 당신이 결정하는 사람이잖아요. 어떻게 할 거예요?</em></p>
      <p>진우의 손은 무의식적으로 키보드로 향했다. 직접 로그를 뒤지고, 직접 롤백 명령을 치고 싶었다. 그게 7년간 그가 가장 잘해온 일이었으니까. 하지만 손끝이 키보드에 닿기 직전, 그는 멈췄다.</p>
      <p>지금 자기가 코드를 잡으면, 다섯 명은 그저 그가 고치는 걸 지켜보게 된다. 오늘은 넘어가겠지. 그러나 다음 장애 때도, 그다음에도, 팀은 그의 손만 바라볼 것이다.</p>
      <p class="dia">"민호 씨, 지금 트래픽 로그부터 봐주세요. 수정 씨는 이전 버전으로 롤백 준비. 저는 고객사에 상황 공유하겠습니다."</p>
      <p>말해놓고 진우는 속으로 놀랐다. 목소리가 생각보다 차분했다. 사실은 심장이 빠르게 뛰고 있었는데도.</p>
      <p class="scene">· · ·</p>
      <p>장애는 한 시간 만에 잡혔다. 롤백이 깔끔하게 먹혔고, 원인은 예상보다 단순한 설정 값 하나였다.</p>
      <p>문제는 그 뒤였다. 막내 민호가 회의실에 남아 고개를 떨구고 있었다. 배포 전 점검을 맡았던 게 그였다.</p>
      <p class="dia">"제가 그 설정을 놓쳤어요. 죄송합니다. 팀장님이 마지막으로 리뷰하신 코드였는데… 제가 망쳤습니다."</p>
      <p>진우는 잠시 말이 없었다. 예전의 그였다면, 어디서 무엇을 놓쳤는지 정확히 짚어주고 다음엔 이렇게 하라고 했을 것이다. 그게 친절이라고 믿었으니까. 하지만 빈 의자에 앉은 지 사흘. 그는 다른 걸 보기 시작했다. 민호가 지금 필요한 건 정답이 아니라, 다시 해볼 수 있다는 감각이라는 걸.</p>
      <p class="dia">"민호 씨. 그 코드, 마지막으로 리뷰한 건 나예요. 놓친 사람은 둘이고요. 그리고 오늘 장애를 가장 먼저 잡은 로그도 민호 씨가 찾았잖아요. 우리 다음 배포 점검 체크리스트, 민호 씨가 한번 만들어볼래요? 오늘 놓친 그거, 제일 잘 아는 사람이 만들어야 하니까."</p>
      <p>민호는 한참을 가만히 있다가, 작게 고개를 끄덕였다. 그 끄덕임 속에 무언가가 다시 켜지는 게 보였다.</p>
      <p class="scene">· · ·</p>
      <p>그날 밤, 진우는 가장 늦게 사무실을 나섰다. 불을 끄기 전, 자기 책상을 한 번 돌아봤다. 여전히 등받이가 낯설었다. 아마 한동안은 그럴 것이다. 하지만 한 가지는 알 것 같았다. 팀장이 짜야 하는 건 코드가 아니라, <em>사람들이 다시 일어설 수 있는 자리</em>라는 것.</p>
      <p>그는 불을 껐다. 빈 의자 다섯 개가 어둠 속에 가지런했다. 내일이면 다시 채워질 자리들이었다.</p>
    `
  },
  {
    title: "정답이 아닌 질문",
    body: `
      <p>2주 차 화요일, 전략 회의가 있었다. 본부장 주재. 안건은 내년도 추천 시스템 로드맵이었다.</p>
      <p>진우는 전날 밤늦게까지 슬라이드를 다듬었다. 트래픽 추이, 모델 성능, 인프라 비용, 경쟁사 동향. 빈틈이 없도록 채웠다. 팀장이 처음 들고 가는 보고였다. <em>빈틈을 보이면 안 된다.</em> 그게 그가 자신에게 건 주문이었다.</p>
      <p class="scene">· · ·</p>
      <p>발표는 무난했다. 본부장이 두어 가지 질문을 했고, 진우는 미리 준비한 답으로 받아넘겼다. 회의가 끝나갈 무렵, 본부장이 의자를 뒤로 젖히며 물었다.</p>
      <p class="dia">"그래서 이걸 왜 해야 하지?"</p>
      <p>진우는 잠시 멈췄다. 분명 첫 슬라이드부터 '왜'를 적어두었다. CTR을 올리기 위해, 체류시간을 늘리기 위해, 광고 수익을 극대화하기 위해. 그는 입을 열어 같은 말을 다시 하려 했다.</p>
      <p>그때 회의실 끝에서 인턴 윤지가 손을 들었다. 입사 두 달 차, 회의에 처음 들어온 친구였다.</p>
      <p class="dia">"저… 죄송한데, 사용자는 추천을 더 받고 싶어할까요? 저는 요즘 추천이 너무 많아서 좀 피곤하거든요."</p>
      <p>찰나의 정적. 진우는 본부장의 눈치를 살폈다. 인턴이 임원 앞에서 이런 말을 한다는 게 어떤 의미인지, 그는 알 만큼 알았다. 변호해 줘야 할까. 자르고 다음으로 넘어가야 할까.</p>
      <p>그런데 본부장이 웃었다.</p>
      <p class="dia">"좋은 질문이네. 진우 팀장, 이 질문에 답하고 다시 옵시다."</p>
      <p class="scene">· · ·</p>
      <p>회의실에 진우와 윤지만 남았다. 윤지가 새파랗게 질려 있었다.</p>
      <p class="dia">"팀장님, 죄송합니다. 제가 분위기를 망친 것 같아서…"</p>
      <p class="dia">"아니에요." 진우가 말했다. "내가 한 시간 동안 안 본 걸 윤지 씨가 한 문장으로 봤어요."</p>
      <p>그는 자기 슬라이드를 다시 펼쳐 봤다. 모든 숫자가 <em>'더 많이'</em>를 향하고 있었다. 더 많은 클릭, 더 긴 체류, 더 큰 매출. 사용자가 그걸 원하는지에 대해서는 한 줄도 없었다.</p>
      <p>예전의 진우라면 이 회의에서 박수받고 싶었다. 빈틈없는 답으로. 하지만 빈 의자에 앉은 지 열흘. 그는 깨닫고 있었다. 좋은 팀장은 정답을 가진 사람이 아니라, <em>좋은 질문 앞에서 자기 답을 다시 의심할 수 있는 사람</em>이라는 걸.</p>
      <p class="scene">· · ·</p>
      <p>그날 저녁, 진우는 슬라이드 1번 페이지를 백지로 만들었다. 그 자리에 한 줄을 적었다.</p>
      <p class="dia">"우리 사용자는 정말로 추천을 더 받고 싶을까?"</p>
      <p>그는 그 슬라이드를 윤지에게 보여줬다. 윤지가 조심스럽게 물었다.</p>
      <p class="dia">"이거… 본부장님이 좋아하실까요?"</p>
      <p class="dia">"몰라요." 진우가 웃었다. "근데 이게 진짜 질문이잖아요. 진짜 질문에서 시작 안 하면, 1년 뒤에 우리는 더 정교한 헛수고를 하고 있을 거예요."</p>
      <p>그는 슬라이드를 저장하고 노트북을 닫았다. 정답을 가진 척하는 것보다, 좋은 질문 앞에 떳떳한 게 훨씬 어려운 일이었다. 그리고 그건 아마, 팀장이 배워야 할 두 번째 일이었다.</p>
    `

  {
    title: "듣는 일",
    body: `
      <p>3주 차 금요일 오후. 시니어 개발자 정훈과의 첫 1on1이었다.</p>
      <p>정훈은 8년 차, 진우보다 1년 늦게 들어왔지만 기술적으로는 팀 안에서 가장 단단한 사람이었다. 진우가 팀장으로 발령난 날, 가장 표정이 굳어 있던 사람이기도 했다.</p>

      <p class="scene">· · ·</p>
      <p>진우는 노트를 펼쳤다. 어젯밤에 만든 1on1 템플릿. <em>업무 진행, 막힌 곳, 커리어 목표, 피드백.</em> 네 항목.</p>

      <p>진우는 입을 다물었다. 머릿속에서는 이미 답변이 만들어지고 있었다. <em>그렇게 생각할 수도 있지만 1on1은 단순한 보고가 아니라…</em> 하지만 그는 그 말을 삼켰다.</p>

      <p class="dia">"요즘이요? 별로예요. 솔직히. 진우 팀장님이 발령난 거 별로고, 김 팀장님 갑자기 옮긴 것도 별로고, 이번 분기에 우리 팀 KPI도 별로고요."</p>
      <p>진우는 고개를 끄덕였다. 무슨 말을 하고 싶었다. <em>나도 별로 안 좋아요, 사실은 매일 무서워요.</em> 그러나 그는 그것도 삼켰다. 지금은 자기 차례가 아니었다.</p>

      <p>수정은 회사 밖에서 메시지를 보냈다. 1년 전에 떠난 회사에서 잘 적응하고 있다고, 자기도 작은 팀의 리더가 됐다고, 진우가 마지막 1on1에서 했던 말을 자기도 후배에게 그대로 했다고.</p>
      <p>정훈은 끝까지 아무 말도 보내지 않았다. 발령일 새벽, 진우가 사무실 자기 책상을 정리하고 있는데, 정훈이 커피 두 잔을 들고 와서 옆자리에 앉았다. 둘은 한 마디도 하지 않고 커피만 마셨다. 그게 두 사람의 인사였다.</p>
      <p class="scene">· · ·</p>
      <p>이사하는 날 아침, 진우는 새 자리에 앉았다. 본부의 끝, 창가 자리, 파티션이 한 뼘 더 높은 그 자리. 1년 전의 김 팀장 자리와 같은 모양이었다.</p>
      <p>의자는 그대로인데 등받이가 낯설었다. 그는 모니터를 켜며 생각했다. <em>나는 어제까지 팀장이었던 사람인데, 오늘부터는 무엇이 되는 사람이지.</em></p>
      <p>그 질문은 1화의 질문과 똑같았다. 자리만 바뀌었을 뿐.</p>
      <p>그는 살짝 웃었다. 어쩌면 일이라는 건 평생 그 질문을 다시 만나는 일인지도 몰랐다. 자리가 바뀔 때마다, 빈 의자에 처음 앉을 때마다.</p>
      <p class="scene">· · ·</p>
      <p>그날 저녁, 그는 옛 팀의 슬랙 채널 알림을 껐다. 정훈이 잘 굴릴 것이다. 그가 끼어들면 정훈의 자리가 작아질 뿐이었다.</p>
      <p>대신 그는 새 노트의 첫 페이지를 펼치고, 1년 전과 같은 한 줄을 다시 적었다.</p>
      <p class="dia">"팀장이 짜야 하는 건 코드가 아니라, 사람들이 다시 일어설 수 있는 자리다."</p>
      <p>그 아래에 한 줄을 더 적었다.</p>
      <p class="dia">"그리고 그 자리는, 한 번 짜고 끝나는 게 아니라 자리가 바뀔 때마다 다시 짜야 하는 자리다."</p>
      <p>그는 노트를 덮었다. 창밖이 어두워지고 있었고, 새 빈 의자들이 그를 기다리고 있었다.</p>
      <p class="scene">· 끝 ·</p>
    `
  }
];

const story = document.getElementById('story');
const epLabel = document.getElementById('epLabel');
const metaLabel = document.getElementById('metaLabel');
const picker = document.getElementById('picker');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

let cur = 0;
function readMinutes(html) {
  const text = html.replace(/<[^>]+>/g, '');
  const len = text.length;
  return Math.max(3, Math.round(len / 600));
}
function render(i) {
  cur = Math.max(0, Math.min(EPS.length - 1, i));
  const ep = EPS[cur];
  epLabel.textContent = `제${cur + 1}화 — ${ep.title}`;
  metaLabel.textContent = `연재 · ${cur + 1} / ${EPS.length}화 · 읽는 데 약 ${readMinutes(ep.body)}분`;
  story.innerHTML = ep.body;
  [...picker.children].forEach((b, idx) => b.classList.toggle('on', idx === cur));
  prevBtn.classList.toggle('off', cur === 0);
  nextBtn.classList.toggle('off', cur === EPS.length - 1);
  prevBtn.disabled = cur === 0;
  nextBtn.disabled = cur === EPS.length - 1;
  try { localStorage.setItem('novel.cur', String(cur)); } catch (_) {}
  if (location.hash !== `#ep${cur + 1}`) {
    history.replaceState(null, '', `#ep${cur + 1}`);
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
EPS.forEach((ep, i) => {
  const b = document.createElement('button');
  b.textContent = `${i + 1}화`;
  b.title = ep.title;
  b.addEventListener('click', () => render(i));
  picker.appendChild(b);
});
prevBtn.addEventListener('click', () => { if (cur > 0) render(cur - 1); });
nextBtn.addEventListener('click', () => { if (cur < EPS.length - 1) render(cur + 1); });

let initial = 0;
const m = location.hash.match(/^#ep(\d+)$/);
if (m) {
  initial = Math.max(0, Math.min(EPS.length - 1, parseInt(m[1], 10) - 1));
} else {
  try {
    const saved = parseInt(localStorage.getItem('novel.cur') || '0', 10);
    if (!isNaN(saved)) initial = Math.max(0, Math.min(EPS.length - 1, saved));
  } catch (_) {}
}
render(initial);

let fs = 17;
function applyFs() { story.style.setProperty('--fs', fs + 'px'); }
document.getElementById('fsBtn').addEventListener('click', () => { fs = Math.min(24, fs + 1); applyFs(); });
document.getElementById('fsBtnM').addEventListener('click', () => { fs = Math.max(14, fs - 1); applyFs(); });
const themeBtn = document.getElementById('themeBtn');
function applyTheme(light) {
  document.body.classList.toggle('light', light);
  themeBtn.textContent = light ? '☾' : '☀︎';
  try { localStorage.setItem('novel.theme', light ? 'light' : 'dark'); } catch (_) {}
}
themeBtn.addEventListener('click', () => applyTheme(!document.body.classList.contains('light')));
try { if (localStorage.getItem('novel.theme') === 'light') applyTheme(true); } catch (_) {}
</script>
</body>
</html>
