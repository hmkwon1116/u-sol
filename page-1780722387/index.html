<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 명언</title>
    <style>
        body {
            background-color: #fbfaf7;
            color: #333;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            max-width: 80%;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5em;
            line-height: 1.6;
        }
        a {
            color: #d6452a;
            text-decoration: none;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5em;
            }
            p {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/">← U-SOL</a>
        <h1>오늘의 명언</h1>
        <p id="quote">"행복은 기다리는 것이 아니라, 노력하는 과정에서 찾아낼 수 있습니다."</p>
        <button onclick="newQuote()">새로운 명언</button>
    </div>

    <script>
        function newQuote() {
            const quotes = [
                "행복은 기다리는 것이 아니라, 노력하는 과정에서 찾아낼 수 있습니다.",
                "사랑은 두 사람 사이에만 존재할 뿐, 한 사람이 느끼는 감정이 아닙니다.",
                "성공은 실패를 무서워하는 사람에게는 영원히 도달할 수 없는 목표입니다."
            ];
            const quoteElement = document.getElementById('quote');
            quoteElement.textContent = quotes[Math.floor(Math.random() * quotes.length)];
        }
    </script>
</body>
</html>
