<title>오늘의 연구사례 · U-SOL</title>

<style>
  :root {
    --bg: #fbfdff; --bg2: #eef4ff;
    --ink: #1a1916; --muted: #8a8780;
    --line: #ecf0f6; --card: #ffffff;
    --accent: #d6452a; --accent-soft: #fce7e0; --accent-dark: #b03721;
    --ink2: #2e3a55;
    --blue: #3a6df0; --blue-soft: #e2ecff;
    --leaf: #4aa376; --leaf-soft: #d8efe1;
    --shadow: 0 1px 2px rgba(26,25,22,0.025), 0 4px 12px rgba(26,25,22,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 0% 0%, #e6efff 0%, transparent 45%),
      radial-gradient(ellipse at 100% 0%, #fde3da 0%, transparent 50%),
      linear-gradient(180deg, var(--bg) 0%, #ffffff 70%, var(--bg2) 100%);
    color: var(--ink);
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  .back {
    position: fixed; top: 16px; left: 18px;
    color: var(--muted); text-decoration: none; font-size: 13.5px;
    letter-spacing: .02em; z-index: 5;
    background: rgba(255,255,255,0.7); backdrop-filter: blur(6px);
    padding: 6px 12px; border-radius: 999px;
    border: 1px solid var(--line);
  }
  .back:hover { color: var(--accent); border-color: var(--accent); }
  .wrap { max-width: 760px; margin: 0 auto; padding: 72px 20px 60px; }

  .eyebrow {
    font-family: 'Fraunces', serif; font-style: italic; font-weight: 600;
    font-size: 14px; letter-spacing: .04em;
    color: var(--accent); text-align: center; margin-bottom: 6px;
  }
  .title-row {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-bottom: 4px;
  }
  h1 {
    font-family: 'Fraunces', serif; font-weight: 900;
    font-size: clamp(34px, 6.4vw, 48px); line-height: 1.05;
    letter-spacing: -0.02em; text-align: center;
  }
  h1 .accent { color: var(--blue); }
  .lede {
    text-align: center; color: var(--muted); font-size: 14px;
    max-width: 520px; margin: 12px auto 22px; line-height: 1.75;
    word-break: keep-all;
  }
  .date-strip {
    display: flex; gap: 8px; justify-content: center; align-items: center;
    margin-bottom: 26px; flex-wrap: wrap;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 999px; padding: 6px 13px; font-size: 12.5px;
    box-shadow: var(--shadow);
  }
  .chip .k { color: var(--muted); }
  .chip .v { font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
  .chip .dot-accent { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .chip .dot-blue { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); }

  /* hero card */
  .hero {
    position: relative;
    background: var(--card); border: 1px solid var(--line); border-radius: 24px;
    overflow: hidden; box-shadow: var(--shadow);
    animation: fade .55s ease both;
  }
  @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .hero-banner {
    position: relative; padding: 28px 24px 22px;
    background: linear-gradient(135deg, #243b78 0%, #3a6df0 55%, #6f8efb 130%);
    color: #fff; overflow: hidden;
  }
  .hero-banner::before {
    content: ""; position: absolute; right: -40px; top: -40px;
    width: 180px; height: 180px; border-radius: 50%;
    background: rgba(255,255,255,0.18); filter: blur(2px);
  }
  .hero-banner::after {
    content: ""; position: absolute; right: 40px; bottom: -60px;
    width: 140px; height: 140px; border-radius: 50%;
    background: rgba(255,255,255,0.12);
  }
  .field-tag {
    position: relative; z-index: 1;
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.22); backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 999px; padding: 5px 11px;
    font-size: 12px; font-weight: 700; letter-spacing: .06em;
  }
  .paper-name {
    position: relative; z-index: 1;
    font-family: 'Fraunces', serif; font-weight: 900;
    font-size: clamp(24px, 4.8vw, 32px); line-height: 1.15;
    margin-top: 14px; letter-spacing: -0.015em;
    text-shadow: 0 2px 14px rgba(0,0,0,0.12);
    word-break: keep-all;
  }
  .paper-sub {
    position: relative; z-index: 1;
    font-size: 13.5px; opacity: 0.94; margin-top: 8px;
    font-weight: 500; letter-spacing: .02em;
    word-break: keep-all;
  }
  .paper-meta {
    position: relative; z-index: 1;
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 12px;
  }
  .paper-meta .mchip {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 999px; padding: 4px 10px;
    font-size: 11.5px; font-weight: 600; color: #fff;
    backdrop-filter: blur(4px);
  }
  .paper-emoji {
    position: absolute; right: 20px; top: 18px; z-index: 1;
    font-size: 44px; line-height: 1; opacity: 0.95;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15));
  }

  .hero-body { padding: 22px 24px 24px; }
  .lead {
    font-size: 15.5px; line-height: 1.8; word-break: keep-all;
    color: var(--ink); margin-bottom: 18px;
  }
  .lead strong { color: var(--blue); font-weight: 700; }

  .section { margin-top: 18px; }
  .section-label {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Fraunces', serif; font-weight: 700; font-style: italic;
    font-size: 13px; letter-spacing: .04em;
    color: var(--blue); margin-bottom: 10px;
  }
  .section-label.accent { color: var(--accent); }
  .section-label.leaf { color: var(--leaf); }
  .section-label .bar { width: 18px; height: 2px; background: currentColor; border-radius: 2px; opacity: .55; }

  .points {
    display: flex; flex-direction: column; gap: 10px;
  }
  .point {
    display: flex; gap: 12px; align-items: flex-start;
    background: var(--blue-soft); border-radius: 14px;
    padding: 12px 14px;
  }
  .point.accent { background: var(--accent-soft); }
  .point.leaf { background: var(--leaf-soft); }
  .point .ico {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 16px; box-shadow: 0 1px 4px rgba(31,39,51,0.06);
    margin-top: 1px;
  }
  .point .txt { font-size: 14.5px; line-height: 1.7; word-break: keep-all; flex: 1; }
  .point .txt b { font-weight: 700; }

  .why {
    background: linear-gradient(180deg, #f3faf6 0%, #e8f4ec 100%);
    border-left: 3px solid var(--leaf);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 14.5px; line-height: 1.8; word-break: keep-all;
  }
  .why b { color: var(--leaf); font-weight: 700; }

  /* link card */
  .link-card {
    margin-top: 18px;
    background: linear-gradient(135deg, #f3f6ff 0%, #e9efff 100%);
    border: 1px dashed #b9c8f0; border-radius: 14px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    text-decoration: none; color: var(--ink);
    transition: all .15s;
  }
  .link-card:hover { border-style: solid; border-color: var(--blue); transform: translateY(-1px); box-shadow: var(--shadow); }
  .link-card .lico {
    flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px;
    background: var(--blue); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800;
  }
  .link-card .ltxt { flex: 1; min-width: 0; }
  .link-card .llabel { font-size: 11.5px; color: var(--muted); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  .link-card .lurl {
    font-size: 13.5px; color: var(--blue); font-weight: 700;
    word-break: break-all; line-height: 1.4; margin-top: 2px;
    font-family: 'Fraunces', serif;
  }
  .link-card .larrow { color: var(--blue); font-size: 18px; }

  /* tags */
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
  .tag {
    font-size: 12px; color: var(--muted);
    background: #f4f7fb; border: 1px solid var(--line);
    border-radius: 999px; padding: 4px 10px;
  }

  /* actions */
  .actions {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    margin-top: 22px;
  }
  .btn {
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700;
    background: var(--card); color: var(--ink);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 11px 20px; cursor: pointer; letter-spacing: .01em;
    transition: all .15s; box-shadow: var(--shadow);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { transform: translateY(-2px); border-color: var(--blue); color: var(--blue); }
  .btn:active { transform: translateY(0); }
  .btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn.primary:hover { background: #2a55c8; border-color: #2a55c8; color: #fff; }
  .btn .em { font-size: 15px; }

  .hint {
    text-align: center; color: var(--muted); font-size: 12.5px;
    margin-top: 22px; letter-spacing: .02em;
  }
  .hint b { color: var(--blue); font-weight: 700; }

  /* mini grid */
  .all-section {
    margin-top: 36px; padding-top: 28px;
    border-top: 1px dashed var(--line);
  }
  .all-title {
    text-align: center; font-family: 'Fraunces', serif; font-weight: 700;
    font-size: 18px; margin-bottom: 6px;
  }
  .all-sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .mini-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }
  .mini {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 12px; cursor: pointer; text-align: left;
    transition: all .15s; font-family: inherit;
  }
  .mini:hover { border-color: var(--blue); transform: translateY(-2px); box-shadow: var(--shadow); }
  .mini.active { border-color: var(--blue); background: var(--blue-soft); }
  .mini .em { font-size: 18px; }
  .mini .nm { font-size: 13px; font-weight: 700; margin-top: 4px; line-height: 1.3; word-break: keep-all; }
  .mini .rg { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>

const titleEl = document.getElementById('paperTitle');

const leadEl = document.getElementById('paperLead');
const pointsList = document.getElementById('pointsList');
const whyText = document.getElementById('whyText');
const linkCard = document.getElementById('linkCard');
const linkUrl = document.getElementById('linkUrl');
const tagList = document.getElementById('tagList');
const todayDate = document.getElementById('todayDate');
const totalCount = document.getElementById('totalCount');
const paperNo = document.getElementById('paperNo');
const miniGrid = document.getElementById('miniGrid');

totalCount.textContent = RESEARCH.length;

function dayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function todayIndex() {
  const d = new Date();
  return dayOfYear(d) % RESEARCH.length;
}

function fmtDate(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`;
}

function pointClass(i) {
  return ['', 'accent', 'leaf'][i % 3];
}

function shortenUrl(url) {
  try {
    const u = new URL(url);
    let path = u.pathname;
    if (path.length > 32) path = path.slice(0, 30) + '…';
    return u.host + path;
  } catch (_) {
    return url;
  }
}

function render(idx) {
  const p = RESEARCH[idx];
  if (!p) return;
  paperNo.textContent = String(idx + 1).padStart(2, '0');
  fieldTagEl.textContent = p.field;
  emojiEl.textContent = p.emoji;
  titleEl.textContent = p.title;
  subEl.textContent = p.sub;
  yearEl.textContent = '📅 ' + p.year;
  orgEl.textContent = '🏛️ ' + p.org;
  leadEl.innerHTML = p.lead;

  pointsList.innerHTML = '';
  p.summary.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'point ' + pointClass(i);
    div.innerHTML = `<div class="ico">${s.ico}</div><div class="txt">${s.txt}</div>`;
    pointsList.appendChild(div);
  });

  whyText.innerHTML = p.why;

  linkCard.setAttribute('href', p.link);
  linkUrl.textContent = shortenUrl(p.link);

  tagList.innerHTML = '';
  (p.tags || []).forEach(t => {
    const s = document.createElement('span');
    s.className = 'tag';
    s.textContent = '#' + t;
    tagList.appendChild(s);
  });

  document.querySelectorAll('.mini').forEach((m, i) => {
    m.classList.toggle('active', i === idx);
  });

  document.querySelector('.hero').style.animation = 'none';
  void document.querySelector('.hero').offsetWidth;
  document.querySelector('.hero').style.animation = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderMiniGrid() {
  RESEARCH.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'mini';
    btn.innerHTML = `<div class="em">${p.emoji}</div><div class="nm">${p.title}</div><div class="rg">${p.year} · ${p.org}</div>`;
    btn.addEventListener('click', () => render(i));
    miniGrid.appendChild(btn);
  });
}

document.getElementById('randomBtn').addEventListener('click', () => {
  const current = RESEARCH.findIndex((_, i) => document.querySelectorAll('.mini')[i]?.classList.contains('active'));
  let r;
  do { r = Math.floor(Math.random() * RESEARCH.length); } while (r === current && RESEARCH.length > 1);
  render(r);
});

document.getElementById('todayBtn').addEventListener('click', () => {
  render(todayIndex());
});

todayDate.textContent = fmtDate(new Date());
renderMiniGrid();
render(todayIndex());
</script>
