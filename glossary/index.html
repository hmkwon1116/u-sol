<style>
  :root {

  body {

  .tabs {
    position: sticky; top: 0; z-index: 10;
    background: rgba(251,250,247,0.92); backdrop-filter: blur(8px);
    margin: 0 -20px 22px; padding: 12px 20px; border-bottom: 1px solid var(--line);

  .cat-head .nm-sub { font-size: 12px; color: var(--muted); }

  .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 680px) { .grid { grid-template-columns: 1fr 1fr; } }

  .term-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    box-shadow: var(--shadow); overflow: hidden;
    transition: border-color .15s, transform .15s;
  }
  .term-card:hover { border-color: #d2cdc0; }
  .term-card.open { border-color: var(--accent); }

  .term-head {
    width: 100%; text-align: left; background: transparent; border: 0; cursor: pointer;
    padding: 16px 18px; display: flex; justify-content: space-between; align-items: center;
    gap: 14px; font-family: inherit; color: inherit;
  }
  .term-head:hover { background: #faf9f5; }
  .term-card.open .term-head { background: #f4f7fd; }
  .term-name { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; line-height: 1.25; }
  .term-ko { font-size: 12px; color: var(--muted); margin-top: 2px; font-style: italic; font-family: 'Fraunces', serif; }
  .chevron {
    flex-shrink: 0; font-size: 18px; color: var(--muted);
    transition: transform .25s ease, color .15s;
  }
  .term-card.open .chevron { transform: rotate(180deg); color: var(--accent); }

  .term-body {
    max-height: 0; overflow: hidden;
    transition: max-height .35s ease;
  }
  .term-card.open .term-body { max-height: 1200px; }
  .term-inner { padding: 0 18px 18px; }

  .row {
    margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--line);
  }
  .row:first-child { margin-top: 0; padding-top: 0; border-top: 0; }
  .row-label {
    display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--accent);
    background: var(--accent-soft); padding: 3px 8px; border-radius: 5px;
    margin-bottom: 8px;
  }
  .row-label.gray { color: var(--muted); background: #efece5; }
  .row-label.warm { color: #b25b1d; background: #fbe9d8; }
  .row-body { font-size: 14.5px; line-height: 1.65; color: var(--ink); }
  .row-body strong { font-weight: 600; }

  footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--line); font-size: 12px; color: var(--muted); text-align: center; }

  .reveal { opacity: 0; transform: translateY(8px); animation: rise .5s ease forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }
</style>

          term: 'TPU', ko: '구글의 AI 전용 칩',
          def: '구글이 AI 학습·추론에 특화시켜 직접 설계한 칩 (Tensor Processing Unit). NVIDIA GPU의 대안 중 하나.',
          analogy: '시중의 만능 공구(GPU) 대신, AI 한 가지 작업에만 최적화된 전용 공구. 그 작업 한정으로는 더 빠르고 효율적이다.',
          why: 'Gemini 같은 구글 자체 모델은 대부분 TPU에서 학습된다. NVIDIA 독점에서 벗어나려는 흐름 — Amazon Trainium, Apple Silicon ML 등도 같은 맥락.'
        },
        {
          term: 'VRAM', ko: 'GPU 전용 메모리',
          def: 'GPU에 붙어있는 전용 메모리. 모델 가중치, KV 캐시, 학습 중간값 등을 올려두는 공간.',
          analogy: '작업대(GPU 코어) 옆에 둔 작업물 거치대. 거치대가 작으면 큰 작업물(모델)을 올릴 수가 없다.',
          why: '"이 모델을 돌릴 수 있느냐"는 사실상 VRAM 용량 싸움. H100은 80GB, H200은 141GB — 같은 GPU 코어라도 VRAM 크기에 따라 올릴 수 있는 모델이 달라진다.'
        },
        {
          term: '분산학습', ko: 'Distributed Training',
          def: '한 GPU로는 다 들어가지 않는 거대 모델을, 수십~수천 대 GPU에 쪼개 동시에 학습시키는 방법.',
          analogy: '100명이 같이 짓는 대형 건물 — 누가 어느 층을 맡고, 부품은 언제 어디서 합칠지 정해두지 않으면 공사판이 된다.',
          why: 'GPT-4급 모델은 한 대로는 영원히 못 만든다. Data·Tensor·Pipeline 등 분산 기법을 어떻게 조합하느냐가 학습 속도를 좌우한다.'
        },
        {
          term: '클러스터', ko: 'GPU Cluster',
          def: '수많은 GPU 서버를 고속 네트워크(InfiniBand 등)로 묶어 하나처럼 쓰는 컴퓨터 무리.',
          analogy: '100명짜리 한 사무실 대신, 도시 곳곳 10개 사무실을 광케이블로 연결해 마치 한 회사처럼 일하는 구조.',
          why: 'AI 학습 속도의 진짜 병목은 GPU 자체가 아니라 GPU들 사이의 통신이다. 같은 H100을 1000장 갖고 있어도 네트워크가 느리면 절반밖에 못 쓴다.'
        }
      ]
    },
    {
      key: 'it', emoji: '🌐', name: '일반 IT',
      sub: '서비스를 굴리는 기본기',
      items: [
        {
          term: 'API', ko: 'Application Programming Interface',
          def: '한 프로그램이 다른 프로그램의 기능을 호출할 수 있게 정해둔 약속·창구.',
          analogy: '식당의 메뉴판 — 손님은 주방에서 어떻게 만드는지 몰라도, 메뉴판에 적힌 대로 주문하면 음식이 나온다.',
          why: '모든 현대 서비스는 API로 연결된다. ChatGPT를 내 앱에 붙이는 것도 API 호출. API 설계를 잘 하면 외부 협업이 쉽고, 잘못하면 시스템 전체가 묶인다.'
        },
        {
          term: '컨테이너 / 쿠버네티스', ko: 'Container / Kubernetes',
          def: '컨테이너는 앱과 실행 환경을 한 박스에 담아 어디서든 똑같이 돌아가게 한 묶음. 쿠버네티스는 이런 박스 수천 개를 자동으로 배치·재시작·확장해 주는 관리자.',
          analogy: '컨테이너는 즉석밥 — 어느 집 전자레인지(서버)에 돌려도 똑같이 익는다. 쿠버네티스는 편의점 점장 — 어느 진열대에 몇 개 놓을지, 떨어지면 채울지 자동으로 한다.',
          why: '"내 노트북에선 되는데 서버에선 안 돼" 문제를 사실상 없앴다. 클라우드 시대 모든 대형 서비스의 표준 운영 방식.'
        },
        {
          term: '로드밸런싱', ko: 'Load Balancing',
          def: '들어오는 요청을 여러 서버에 골고루 나눠줘서, 한 서버가 과부하로 죽지 않게 하는 분배 장치.',
          analogy: '마트 계산대 앞에 줄을 정리해주는 직원 — "3번 계산대 비었어요" 하고 손님을 흘려보낸다.',
          why: '사용자가 늘어도 안 죽는 서비스의 기본기. 로드밸런서가 죽으면 그 뒤에 서버 100대가 있어도 무용지물 — 그만큼 핵심 장치.'
        },
        {
          term: 'CI/CD', ko: '지속적 통합·배포',
          def: '코드가 바뀌면 자동으로 테스트(CI)하고, 통과하면 자동으로 서비스에 반영(CD)하는 파이프라인.',
          analogy: '공장의 자동 조립·검수 라인. 사람이 일일이 옮기지 않아도, 부품이 올라오면 알아서 조립 → 검사 → 출하까지 흘러간다.',
          why: '하루에 수십 번 배포하는 빅테크의 비결. 사람이 일일이 손으로 빌드·배포하면 실수가 나오고 속도도 안 따라간다. GitHub Actions·Jenkins가 대표 도구.'
        }
      ]
    }
  ];

  const tabRow = document.getElementById('tabRow');
  const groupsEl = document.getElementById('groups');
  const countPill = document.getElementById('countPill');

  const totalCount = DATA.reduce((n, c) => n + c.items.length, 0);
  countPill.textContent = `전체 ${totalCount}개 용어`;

  function makeTab(key, label, count, active) {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'tab' + (active ? ' active' : '');
    b.dataset.key = key;
    b.innerHTML = `${label}<span class="num">${count}</span>`;
    return b;
  }
  tabRow.appendChild(makeTab('all', '전체', totalCount, true));
  DATA.forEach(cat => tabRow.appendChild(makeTab(cat.key, cat.emoji + ' ' + cat.name, cat.items.length, false)));

  DATA.forEach((cat, gi) => {
    const sec = document.createElement('section');
    sec.className = 'cat-group reveal';
    sec.dataset.key = cat.key;
    sec.style.animationDelay = (0.15 + gi * 0.04) + 's';
    sec.innerHTML = `
      <div class="cat-head">
        <span class="emoji">${cat.emoji}</span>
        <div>
          <div class="nm">${cat.name}</div>
          <div class="nm-sub">${cat.sub} · ${cat.items.length}개</div>
        </div>
      </div>
      <div class="grid"></div>
    `;
    const grid = sec.querySelector('.grid');
    cat.items.forEach(it => {
      const card = document.createElement('div');
      card.className = 'term-card';
      card.innerHTML = `
        <button type="button" class="term-head">
          <div>
            <div class="term-name">${it.term}</div>
            <div class="term-ko">${it.ko}</div>
          </div>
          <span class="chevron">⌄</span>
        </button>
        <div class="term-body">
          <div class="term-inner">
            <div class="row">
              <span class="row-label">정의</span>
              <div class="row-body">${it.def}</div>
            </div>
            <div class="row">
              <span class="row-label warm">쉬운 비유</span>
              <div class="row-body">${it.analogy}</div>
            </div>
            <div class="row">
              <span class="row-label gray">왜 중요한가</span>
              <div class="row-body">${it.why}</div>
            </div>
          </div>
        </div>
      `;
      const head = card.querySelector('.term-head');
      head.addEventListener('click', () => card.classList.toggle('open'));
      grid.appendChild(card);
    });
    groupsEl.appendChild(sec);
  });

  tabRow.addEventListener('click', (e) => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const key = btn.dataset.key;
    document.querySelectorAll('.cat-group').forEach(g => {
      g.classList.toggle('hidden', key !== 'all' && g.dataset.key !== key);
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>
</body>
</html>
