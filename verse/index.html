<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="오늘의 말씀과 상황별 맞춤 말씀, 그리고 6구절 모음 — 매일 다른 말씀을 외부 성경 API로 신선하게.">
<meta name="theme-color" content="#f4efe6">
<title>오늘의 말씀 · U-SOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://bible.helloao.org">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4efe6; --bg2: #efe8da; --ink: #3a352c; --muted: #8c8472;
    --accent: #9a7b4f; --accent-soft: #efe1c8;
    --line: #e0d7c6; --card: #fffdf8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 0%, #faf6ee, transparent 60%), linear-gradient(180deg, var(--bg), var(--bg2));
    color: var(--ink); font-family: 'Noto Serif KR', serif;
    display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;
  }
  .back { position: fixed; top: 18px; left: 20px; color: var(--muted); text-decoration: none; font-size: 14px; letter-spacing: .04em; z-index: 5; }
  .back:hover { color: var(--accent); }
  .wrap {
    flex: 1; max-width: 680px; margin: 0 auto; width: 100%;
    padding: 76px 22px 60px; display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .date { font-size: 14px; color: var(--muted); letter-spacing: .1em; margin-bottom: 8px; }
  .eyebrow {
    font-family: 'Gowun Batang', serif; font-size: 15px; color: var(--accent);
    letter-spacing: .25em; margin-bottom: 30px; position: relative;
  }
  .eyebrow::after { content: ""; display: block; width: 40px; height: 1px; background: var(--accent); margin: 16px auto 0; opacity: .5; }

  /* hero: today's verse */
  .hero {
    width: 100%; display: flex; flex-direction: column; align-items: center;
    margin-bottom: 8px;
  }
  .verse {
    font-family: 'Gowun Batang', serif; font-size: clamp(20px, 4.8vw, 28px);
    line-height: 1.85; font-weight: 400; letter-spacing: -0.01em;
    margin-bottom: 22px; word-break: keep-all; min-height: 60px;
    animation: fade .9s ease both;
  }
  .ref { font-size: 16px; color: var(--accent); font-weight: 600; letter-spacing: .06em; margin-bottom: 24px; min-height: 22px; animation: fade .9s ease .2s both; }
  .loading { font-size: 14px; color: var(--muted); opacity: .7; font-family: 'Noto Serif KR', serif; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
  button, .btn {
    font-family: 'Noto Serif KR', serif; font-size: 13.5px; color: var(--ink);
    background: var(--card); border: 1px solid var(--line); border-radius: 999px;
    padding: 10px 18px; cursor: pointer; letter-spacing: .04em;
    transition: all .15s; box-shadow: 0 2px 10px rgba(120,100,60,0.06);
  }
  button:hover, .btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  button:active { transform: translateY(0); }

  /* divider */
  .divider {
    width: 100%; display: flex; align-items: center; gap: 14px;
    color: var(--muted); margin: 44px 0 22px;
    font-family: 'Gowun Batang', serif; font-size: 14px; letter-spacing: .2em;
  }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  /* situation chips */
  .chips {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin-bottom: 18px; width: 100%;
  }
  .chip {
    font-family: 'Noto Serif KR', serif; font-size: 13.5px;
    background: var(--card); border: 1px solid var(--line); border-radius: 999px;
    padding: 9px 16px; cursor: pointer; color: var(--ink); letter-spacing: .02em;
    transition: all .15s; box-shadow: 0 2px 8px rgba(120,100,60,0.05);
    display: inline-flex; align-items: center; gap: 5px;
  }
  .chip:hover { border-color: var(--accent); transform: translateY(-1px); }
  .chip.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
    box-shadow: 0 4px 12px rgba(154,123,79,0.25);
  }
  .chip .ic { font-size: 14px; }

  .situation-card {
    width: 100%; background: var(--card); border: 1px solid var(--line);
    border-radius: 18px; padding: 24px 22px 22px; min-height: 110px;
    box-shadow: 0 4px 16px rgba(120,100,60,0.06);
    text-align: left; opacity: 0; transform: translateY(8px);
    transition: opacity .35s ease, transform .35s ease;
  }
  .situation-card.show { opacity: 1; transform: none; }
  .situation-card .placeholder {
    color: var(--muted); font-size: 14px; text-align: center; padding: 12px 0;
    font-family: 'Gowun Batang', serif; letter-spacing: .04em;
  }
  .situation-card .stag { font-family: 'Gowun Batang', serif; font-size: 12px; color: var(--accent); letter-spacing: .2em; margin-bottom: 10px; }
  .situation-card .st {
    font-family: 'Gowun Batang', serif; font-size: clamp(17px, 4.2vw, 21px);
    line-height: 1.85; font-weight: 400; word-break: keep-all; margin-bottom: 12px;
  }
  .situation-card .sr { font-size: 14px; color: var(--accent); font-weight: 600; letter-spacing: .05em; margin-bottom: 12px; }
  .situation-card .srow { display: flex; gap: 8px; flex-wrap: wrap; }
  .situation-card .srow button { font-size: 12.5px; padding: 7px 14px; }

  /* collection */
  .list { width: 100%; display: flex; flex-direction: column; gap: 14px; margin-bottom: 8px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 22px 20px 20px; text-align: left;
    box-shadow: 0 4px 14px rgba(120,100,60,0.06);
    opacity: 0; transform: translateY(8px);
    animation: rise .55s ease forwards;
  }
  .card .idx { font-family: 'Gowun Batang', serif; font-size: 11.5px; color: var(--accent); letter-spacing: .2em; margin-bottom: 9px; }
  .card .t {
    font-family: 'Gowun Batang', serif; font-size: clamp(16px, 4vw, 19px);
    line-height: 1.85; font-weight: 400; word-break: keep-all; margin-bottom: 12px;
  }
  .card .r { font-size: 13.5px; color: var(--accent); font-weight: 600; letter-spacing: .05em; }
  @keyframes rise { to { opacity: 1; transform: none; } }

  .note { margin-top: 22px; font-size: 12px; color: var(--muted); line-height: 1.7; max-width: 460px; opacity: .8; }
  .note a { color: var(--accent); text-decoration: none; }
  footer { text-align: center; padding: 22px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--line); }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <a class="back" href="/">← U-SOL</a>
  <div class="wrap">
    <div class="date" id="date">—</div>
    <div class="eyebrow">오늘의 말씀</div>

    <section class="hero">
      <blockquote class="verse" id="verse"><span class="loading">말씀을 불러오는 중…</span></blockquote>
      <div class="ref" id="ref"></div>
      <div class="actions">
        <button id="todayBtn">오늘의 말씀</button>
        <button id="nextBtn">다른 말씀 보기</button>
        <button id="copyBtn">복사하기</button>
      </div>
    </section>

    <div class="divider">상황별 맞춤 말씀</div>
    <div class="chips" id="chips"></div>
    <div class="situation-card" id="situationCard">
      <div class="placeholder">지금 마음을 누르는 한 가지를 골라보세요</div>
    </div>

    <div class="divider">오늘의 말씀 모음</div>
    <div class="list" id="list"></div>
    <div class="actions">
      <button id="shuffleBtn">다른 묶음 보기</button>
      <button id="copyAllBtn">모두 복사</button>
    </div>

    <p class="note">
      말씀 본문은 <a href="https://bible.helloao.org/" target="_blank" rel="noopener">helloao.org</a>의
      한국어 성경(1910 개역) 무료 API로 매번 새로 불러옵니다.
      오프라인이거나 응답이 늦으면 캐시된 본문이 잠시 표시될 수 있어요.
    </p>
  </div>
  <footer>© 2026 U-SOL · <a href="/">메인으로</a></footer>

    { b:"2CO", c:5, v:"17", r:"고린도후서 5:17", t:"그런즉 누구든지 그리스도 안에 있으면 새로운 피조물이라 이전 것은 지나갔으니 보라 새 것이 되었도다", cat:["새출발"] },
    { b:"PHP", c:3, v:"13", r:"빌립보서 3:13", t:"형제들아 나는 아직 내가 잡은 줄로 여기지 아니하고 오직 한 일 즉 뒤에 있는 것은 잊어버리고 앞에 있는 것을 잡으려고", cat:["새출발","결단"] },
    { b:"JER", c:29, v:"11", r:"예레미야 29:11", t:"나 여호와가 말하노라 너희를 향한 나의 생각을 내가 아나니 재앙이 아니라 곧 평안이요 너희 장래에 소망을 주려하는 생각이라", cat:["새출발","희망"] },
    { b:"LAM", c:3, v:"22", r:"예레미야애가 3:22", t:"여호와의 자비와 긍휼이 무궁하시므로 우리가 진멸되지 아니함이니이다", cat:["새출발","희망"] },

    // 결단 / 용기
    { b:"JOS", c:1, v:"9", r:"여호수아 1:9", t:"내가 네게 명하지 아니하였느냐 마음을 강하게 하고 담대히 하라 두려워 말며 놀라지 말라 네가 어디로 가든지 네 하나님 여호와가 너와 함께 하느니라", cat:["결단","불안"] },
    { b:"DEU", c:31, v:"6", r:"신명기 31:6", t:"너는 마음을 강하게 하고 담대히 하라 그들을 두려워 말라 그들 앞에서 떨지 말라 이는 네 하나님 여호와 그가 너와 함께 행하실 것임이라 반드시 너를 떠나지 아니하시며 버리지 아니하시리라", cat:["결단","불안"] },
    { b:"PSA", c:27, v:"1", r:"시편 27:1", t:"여호와는 나의 빛이요 나의 구원이시니 내가 누구를 두려워하리요 여호와는 내 생명의 능력이시니 내가 누구를 무서워하리요", cat:["결단","불안"] },
    { b:"2TI", c:1, v:"7", r:"디모데후서 1:7", t:"하나님이 우리에게 주신 것은 두려워하는 마음이 아니요 오직 능력과 사랑과 근신하는 마음이니", cat:["결단"] },

    // 신뢰 / 빛
    { b:"PRO", c:3, v:"5", r:"잠언 3:5", t:"너는 마음을 다하여 여호와를 의뢰하고 네 명철을 의지하지 말라", cat:["결단","신뢰"] },
    { b:"PSA", c:37, v:"4", r:"시편 37:4", t:"또 여호와를 기뻐하라 저가 네 마음의 소원을 이루어 주시리로다", cat:["감사"] },
    { b:"ROM", c:8, v:"28", r:"로마서 8:28", t:"우리가 알거니와 하나님을 사랑하는 자 곧 그 뜻대로 부르심을 입은 자들에게는 모든 것이 합력하여 선을 이루느니라", cat:["힘듦","희망"] },
    { b:"MAT", c:6, v:"33", r:"마태복음 6:33", t:"너희는 먼저 그의 나라와 그의 의를 구하라 그리하면 이 모든 것을 너희에게 더하시리라", cat:["결단"] },
    { b:"PSA", c:119, v:"105", r:"시편 119:105", t:"주의 말씀은 내 발에 등이요 내 길에 빛이니이다", cat:["결단"] },
    { b:"PSA", c:121, v:"1", r:"시편 121:1", t:"내가 산을 향하여 눈을 들리라 나의 도움이 어디서 올꼬", cat:["힘듦","위로"] },
    { b:"GAL", c:5, v:"22", r:"갈라디아서 5:22", t:"오직 성령의 열매는 사랑과 희락과 화평과 오래 참음과 자비와 양선과 충성과", cat:["감사"] },
    { b:"PRO", c:12, v:"25", r:"잠언 12:25", t:"근심이 사람의 마음에 있으면 그것으로 번뇌케 하나 선한 말은 그것을 즐겁게 하느니라", cat:["불안","위로"] }
  ];

  const CATEGORIES = [
    { key:"불안",  ic:"😰", label:"불안할 때" },
    { key:"슬픔",  ic:"😢", label:"슬플 때" },
    { key:"힘듦",  ic:"💪", label:"힘들 때" },
    { key:"화",    ic:"😡", label:"화날 때" },
    { key:"감사",  ic:"🙏", label:"감사할 때" },
    { key:"사랑",  ic:"💕", label:"사랑이 필요할 때" },
    { key:"새출발", ic:"🌅", label:"새 출발할 때" },
    { key:"결단",  ic:"🔥", label:"결단이 필요할 때" }
  ];

  // -------- helloao API: fetch chapter, extract verse(s) --------
  const API_BASE = "https://bible.helloao.org/api/kor_old";
  const chapterCache = new Map();

  function cleanText(s) {
    return String(s)
      .replace(/[`´]/g, "")  // kor_old uses backticks as quote marks
      .replace(/\s+/g, " ")
      .trim();
  }

  async function fetchChapter(book, chapter) {
    const key = `${book}/${chapter}`;
    if (chapterCache.has(key)) return chapterCache.get(key);
    const p = (async () => {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 6000);
      try {
        const res = await fetch(`${API_BASE}/${book}/${chapter}.json`, { signal: ctrl.signal });
        if (!res.ok) throw new Error("http " + res.status);
        const data = await res.json();
        return data.chapter && data.chapter.content ? data.chapter.content : null;
      } finally { clearTimeout(t); }
    })();
    chapterCache.set(key, p.catch(() => null));
    return chapterCache.get(key);
  }

  async function fetchVerseText(verse) {
    // verse.v can be "1" or "1-2"
    const parts = String(verse.v).split("-").map(n => parseInt(n, 10));
    const start = parts[0], end = parts[1] || parts[0];
    const content = await fetchChapter(verse.b, verse.c);
    if (!content) return null;
    const lines = [];
    for (const item of content) {
      if (item.type === "verse" && item.number >= start && item.number <= end) {
        const t = Array.isArray(item.content) ? item.content.join(" ") : String(item.content);
        lines.push(cleanText(t));
      }
    }
    return lines.length ? lines.join(" ") : null;
  }

  // -------- deterministic seeded random for daily picks --------
  function dayNumber(d) { return Math.floor(d.getTime() / 86400000); }
  function seededRand(seed) {
    let h = 2166136261 ^ seed;
    return function () {
      h += (h << 13); h ^= (h >>> 7);
      h += (h << 3);  h ^= (h >>> 17);
      h += (h << 5);
      return ((h >>> 0) % 1_000_000) / 1_000_000;
    };
  }
  function pickUnique(seed, count) {
    const rand = seededRand(seed);
    const pool = VERSES.map((_, i) => i);
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, Math.min(count, pool.length));
  }

  // -------- DOM --------
  const dateEl = document.getElementById('date');
  const verseEl = document.getElementById('verse');
  const refEl = document.getElementById('ref');
  const chipsEl = document.getElementById('chips');
  const sitCard = document.getElementById('situationCard');
  const listEl = document.getElementById('list');

  function renderToday(dateNow) {
    const days = ['일','월','화','수','목','금','토'];
    dateEl.textContent = `${dateNow.getFullYear()}. ${dateNow.getMonth()+1}. ${dateNow.getDate()}. (${days[dateNow.getDay()]})`;
  }

  async function displayVerseInto(verse, textEl, refElTarget) {
    // show cached fallback first for instant feel
    textEl.style.animation = 'none'; refElTarget.style.animation = 'none';
    void textEl.offsetWidth;
    textEl.textContent = verse.t;
    refElTarget.textContent = verse.r;
    textEl.style.animation = ''; refElTarget.style.animation = '';
    // refresh with API text if available
    try {
      const fresh = await fetchVerseText(verse);
      if (fresh && fresh.length > 4) textEl.textContent = fresh;
    } catch (e) { /* keep fallback */ }
  }

  async function showToday() {
    const now = new Date();
    renderToday(now);
    const idx = ((dayNumber(now) % VERSES.length) + VERSES.length) % VERSES.length;
    await displayVerseInto(VERSES[idx], verseEl, refEl);
  }

  async function showRandom() {
    const idx = Math.floor(Math.random() * VERSES.length);
    await displayVerseInto(VERSES[idx], verseEl, refEl);
  }

  function renderChips() {
    chipsEl.innerHTML = CATEGORIES.map(c =>
      `<button class="chip" data-cat="${c.key}"><span class="ic">${c.ic}</span><span>${c.label}</span></button>`
    ).join('');
    chipsEl.querySelectorAll('.chip').forEach(el => {
      el.addEventListener('click', () => onChipClick(el.dataset.cat, el));
    });
  }

  let lastSitIdx = -1;
  async function onChipClick(catKey, btnEl) {
    chipsEl.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === btnEl));
    const pool = VERSES.map((v, i) => ({ v, i })).filter(x => x.v.cat && x.v.cat.includes(catKey));
    if (!pool.length) return;
    let pick = pool[Math.floor(Math.random() * pool.length)];
    if (pool.length > 1 && pick.i === lastSitIdx) {
      pick = pool[(pool.indexOf(pick) + 1) % pool.length];
    }
    lastSitIdx = pick.i;
    const v = pick.v;

    sitCard.classList.remove('show');
    sitCard.innerHTML = `
      <div class="stag">${(CATEGORIES.find(c => c.key === catKey) || {}).label || catKey}</div>
      <blockquote class="st" id="sitText">${v.t}</blockquote>
      <div class="sr" id="sitRef">${v.r}</div>
      <div class="srow">
        <button id="sitAgainBtn">이 상황의 다른 말씀</button>
        <button id="sitCopyBtn">복사하기</button>
      </div>`;
    requestAnimationFrame(() => sitCard.classList.add('show'));

    const stEl = document.getElementById('sitText');
    const srEl = document.getElementById('sitRef');
    try {
      const fresh = await fetchVerseText(v);
      if (fresh && fresh.length > 4) stEl.textContent = fresh;
    } catch (e) {}

    document.getElementById('sitAgainBtn').addEventListener('click', () => onChipClick(catKey, btnEl));
    document.getElementById('sitCopyBtn').addEventListener('click', () => {
      const text = `${stEl.textContent} (${srEl.textContent})`;
      navigator.clipboard?.writeText(text).then(() => {
        const b = document.getElementById('sitCopyBtn');
        const old = b.textContent; b.textContent = '복사됨';
        setTimeout(() => b.textContent = old, 1400);
      });
    });
  }

  function renderCollection(indexes) {
    listEl.innerHTML = '';
    indexes.forEach((vi, i) => {
      const v = VERSES[vi];
      const card = document.createElement('article');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.06}s`;
      card.dataset.vi = vi;
      card.innerHTML = `
        <div class="idx">No. ${String(i + 1).padStart(2, '0')}</div>
        <blockquote class="t">${v.t}</blockquote>
        <div class="r">${v.r}</div>`;
      listEl.appendChild(card);
    });
    // refresh each card's text from API
    indexes.forEach(async (vi) => {
      const v = VERSES[vi];
      try {
        const fresh = await fetchVerseText(v);
        if (!fresh || fresh.length < 4) return;
        const card = listEl.querySelector(`.card[data-vi="${vi}"] .t`);
        if (card) card.textContent = fresh;
      } catch (e) {}
    });
  }

  function showCollectionToday() {
    const seed = dayNumber(new Date());
    renderCollection(pickUnique(seed, 6));
  }

  function showCollectionShuffle() {
    const seed = Math.floor(Math.random() * 2_147_483_647);
    renderCollection(pickUnique(seed, 6));
  }

  // -------- wiring --------
  document.getElementById('todayBtn').addEventListener('click', showToday);
  document.getElementById('nextBtn').addEventListener('click', showRandom);
  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = `${verseEl.textContent} (${refEl.textContent})`;
    navigator.clipboard?.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      const old = btn.textContent; btn.textContent = '복사됨';
      setTimeout(() => btn.textContent = old, 1400);
    });
  });
  document.getElementById('shuffleBtn').addEventListener('click', showCollectionShuffle);
  document.getElementById('copyAllBtn').addEventListener('click', () => {
    const text = Array.from(listEl.querySelectorAll('.card'))
      .map(c => `${c.querySelector('.t').textContent.trim()} (${c.querySelector('.r').textContent.trim()})`)
      .join('\n\n');
    navigator.clipboard?.writeText(text).then(() => {
      const btn = document.getElementById('copyAllBtn');
      const old = btn.textContent; btn.textContent = '복사됨';
      setTimeout(() => btn.textContent = old, 1400);
    });
  });

  renderChips();
  showToday();
  showCollectionToday();
</script>
</body>
</html>
