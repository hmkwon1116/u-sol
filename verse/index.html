<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="오늘의 성경 말씀 — 매일 한 구절, 잠잠히 마음에 새기는 시간.">
<meta name="theme-color" content="#f4efe6">
<title>오늘의 말씀 · U-SOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4efe6;
    --bg2: #efe8da;
    --ink: #3a352c;
    --muted: #8c8472;
    --accent: #9a7b4f;
    --line: #e0d7c6;
    --card: #fffdf8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 50% 0%, #faf6ee, transparent 60%),
      linear-gradient(180deg, var(--bg), var(--bg2));
    color: var(--ink);
    font-family: 'Noto Serif KR', serif;
    display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }
  .back {
    position: fixed; top: 18px; left: 20px;
    color: var(--muted); text-decoration: none; font-size: 14px;
    letter-spacing: .04em;
  }
  .back:hover { color: var(--accent); }
  .wrap {
    flex: 1;
    max-width: 620px; margin: 0 auto; width: 100%;
    padding: 80px 28px 60px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center;
  }
  .date {
    font-size: 14px; color: var(--muted); letter-spacing: .1em;
    margin-bottom: 8px;
  }
  .eyebrow {
    font-family: 'Gowun Batang', serif;
    font-size: 15px; color: var(--accent); letter-spacing: .25em;
    text-transform: none; margin-bottom: 40px;
    position: relative;
  }
  .eyebrow::after {
    content: ""; display: block; width: 40px; height: 1px;
    background: var(--accent); margin: 18px auto 0; opacity: .5;
  }
  .verse {
    font-family: 'Gowun Batang', serif;
    font-size: clamp(22px, 5.2vw, 31px);
    line-height: 1.85; font-weight: 400;
    letter-spacing: -0.01em;
    margin-bottom: 34px;
    word-break: keep-all;
    animation: fade 1.1s ease both;
  }
  .ref {
    font-size: 16px; color: var(--accent); font-weight: 600;
    letter-spacing: .06em; margin-bottom: 50px;
    animation: fade 1.1s ease .25s both;
  }
  @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button {
    font-family: 'Noto Serif KR', serif; font-size: 14px;
    color: var(--ink); background: var(--card);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 12px 22px; cursor: pointer; letter-spacing: .04em;
    transition: all .15s; box-shadow: 0 2px 10px rgba(120,100,60,0.06);
  }
  button:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  .note {
    margin-top: 40px; font-size: 12.5px; color: var(--muted);
    line-height: 1.8; max-width: 380px; opacity: .85;
  }
  footer {
    text-align: center; padding: 22px; font-size: 12px;
    color: var(--muted); border-top: 1px solid var(--line);
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <a class="back" href="/">← U-SOL</a>
  <div class="wrap">
    <div class="date" id="date">—</div>
    <div class="eyebrow">오늘의 말씀</div>
    <blockquote class="verse" id="verse">…</blockquote>
    <div class="ref" id="ref"></div>
    <div class="actions">
      <button id="todayBtn">오늘의 말씀</button>
      <button id="nextBtn">다른 말씀 보기</button>
      <button id="copyBtn">복사하기</button>
    </div>
    <p class="note">
      매일 한 구절이 날짜에 따라 잠잠히 바뀝니다.
      같은 날에는 어디서 열어도 같은 말씀이 보여요.
    </p>
  </div>
  <footer>© 2026 U-SOL · <a href="/">메인으로</a></footer>

<script>
  const VERSES = [
    { t: "여호와는 나의 목자시니 내게 부족함이 없으리로다", r: "시편 23:1" },
    { t: "수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라", r: "마태복음 11:28" },
    { t: "내가 네게 명령한 것이 아니냐 강하고 담대하라 두려워하지 말며 놀라지 말라 네가 어디로 가든지 네 하나님 여호와가 너와 함께 하느니라", r: "여호수아 1:9" },
    { t: "두려워하지 말라 내가 너와 함께 함이라 놀라지 말라 나는 네 하나님이 됨이라", r: "이사야 41:10" },
    { t: "여호와를 기뻐하라 그가 네 마음의 소원을 네게 이루어 주시리로다", r: "시편 37:4" },
    { t: "범사에 감사하라 이것이 그리스도 예수 안에서 너희를 향하신 하나님의 뜻이니라", r: "데살로니가전서 5:18" },
    { t: "아무 것도 염려하지 말고 다만 모든 일에 기도와 간구로 너희 구할 것을 감사함으로 하나님께 아뢰라", r: "빌립보서 4:6" },
    { t: "마음이 상한 자들을 고치시며 그들의 상처를 싸매시는도다", r: "시편 147:3" },
    { t: "여호와는 너를 지키시는 이시라 여호와께서 네 오른쪽에서 네 그늘이 되시나니", r: "시편 121:5" },
    { t: "내게 능력 주시는 자 안에서 내가 모든 것을 할 수 있느니라", r: "빌립보서 4:13" },
    { t: "너희 염려를 다 주께 맡기라 이는 그가 너희를 돌보심이라", r: "베드로전서 5:7" },
    { t: "사랑은 오래 참고 사랑은 온유하며 시기하지 아니하며 자랑하지 아니하며 교만하지 아니하며", r: "고린도전서 13:4" },
    { t: "여호와는 나의 빛이요 나의 구원이시니 내가 누구를 두려워하리요", r: "시편 27:1" },
    { t: "이 날은 여호와께서 정하신 것이라 이 날에 우리가 즐거워하고 기뻐하리로다", r: "시편 118:24" },
    { t: "네 길을 여호와께 맡기라 그를 의지하면 그가 이루시고", r: "시편 37:5" },
    { t: "주의 말씀은 내 발에 등이요 내 길에 빛이니이다", r: "시편 119:105" },
    { t: "여호와여 아침에 주께서 나의 소리를 들으시리니 아침에 내가 주께 기도하고 바라리이다", r: "시편 5:3" },
    { t: "그런즉 믿음, 소망, 사랑 이 세 가지는 항상 있을 것인데 그 중의 제일은 사랑이라", r: "고린도전서 13:13" },
    { t: "여호와의 인자와 긍휼이 무궁하시므로 우리가 진멸되지 아니함이니이다 이것들이 아침마다 새로우니 주의 성실하심이 크시도소이다", r: "예레미야애가 3:22-23" },
    { t: "평안을 너희에게 끼치노니 곧 나의 평안을 너희에게 주노라 내가 너희에게 주는 것은 세상이 주는 것과 같지 아니하니라", r: "요한복음 14:27" },
    { t: "여호와께서 너에게 복을 주시고 너를 지키시기를 원하며", r: "민수기 6:24" },
    { t: "하나님이 우리에게 주신 것은 두려워하는 마음이 아니요 오직 능력과 사랑과 절제하는 마음이니", r: "디모데후서 1:7" },
    { t: "내가 산을 향하여 눈을 들리라 나의 도움이 어디서 올까 나의 도움은 천지를 지으신 여호와에게서로다", r: "시편 121:1-2" },
    { t: "너는 마음을 다하여 여호와를 신뢰하고 네 명철을 의지하지 말라", r: "잠언 3:5" },
    { t: "그러므로 우리가 긍휼하심을 받고 때를 따라 돕는 은혜를 얻기 위하여 은혜의 보좌 앞에 담대히 나아갈 것이니라", r: "히브리서 4:16" },
    { t: "우는 자들과 함께 울라 즐거워하는 자들과 함께 즐거워하고", r: "로마서 12:15" },
    { t: "여호와는 선하시며 환난 날에 산성이시라 그는 자기에게 피하는 자들을 아시느니라", r: "나훔 1:7" },
    { t: "오직 여호와를 앙망하는 자는 새 힘을 얻으리니 독수리가 날개치며 올라감 같을 것이요", r: "이사야 40:31" },
    { t: "하나님은 우리의 피난처시요 힘이시니 환난 중에 만날 큰 도움이시라", r: "시편 46:1" },
    { t: "너희는 먼저 그의 나라와 그의 의를 구하라 그리하면 이 모든 것을 너희에게 더하시리라", r: "마태복음 6:33" },
    { t: "보라 내가 새 일을 행하리니 이제 나타낼 것이라 너희가 그것을 알지 못하겠느냐", r: "이사야 43:19" },
    { t: "여호와께서 네 앞에서 가시며 너와 함께 하사 너를 떠나지 아니하시며 버리지 아니하시리니 너는 두려워하지 말며 놀라지 말라", r: "신명기 31:8" }
  ];

  const dateEl = document.getElementById('date');
  const verseEl = document.getElementById('verse');
  const refEl = document.getElementById('ref');

  function dayIndex(d) {
    const days = Math.floor(d.getTime() / 86400000);
    return ((days % VERSES.length) + VERSES.length) % VERSES.length;
  }

  function showVerse(i) {
    const v = VERSES[i];
    verseEl.style.animation = 'none';
    refEl.style.animation = 'none';
    void verseEl.offsetWidth;
    verseEl.textContent = v.t;
    refEl.textContent = v.r;
    verseEl.style.animation = '';
    refEl.style.animation = '';
  }

  function showToday() {
    const now = new Date();
    const days = ['일','월','화','수','목','금','토'];
    dateEl.textContent = `${now.getFullYear()}. ${now.getMonth()+1}. ${now.getDate()}. (${days[now.getDay()]})`;
    showVerse(dayIndex(now));
  }

  let current = 0;
  document.getElementById('todayBtn').addEventListener('click', showToday);
  document.getElementById('nextBtn').addEventListener('click', () => {
    current = (Math.floor(Math.random() * VERSES.length));
    showVerse(current);
  });
  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = `${verseEl.textContent} (${refEl.textContent})`;
    navigator.clipboard?.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      const old = btn.textContent; btn.textContent = '복사됨';
      setTimeout(() => btn.textContent = old, 1400);
    });
  });

  showToday();
</script>
</body>
</html>
