<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="오늘의 성경 말씀과 실생활 네 컷 만화 — 매일 한 구절, 삶으로 새기는 시간.">
<meta name="theme-color" content="#f4efe6">
<title>오늘의 말씀 · U-SOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@300;400;600&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4efe6; --bg2: #efe8da; --ink: #3a352c; --muted: #8c8472;
    --accent: #9a7b4f; --line: #e0d7c6; --card: #fffdf8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 0%, #faf6ee, transparent 60%), linear-gradient(180deg, var(--bg), var(--bg2));
    color: var(--ink); font-family: 'Noto Serif KR', serif;
    display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;
  }
  .back { position: fixed; top: 18px; left: 20px; color: var(--muted); text-decoration: none; font-size: 14px; letter-spacing: .04em; z-index: 5; }
  .back:hover { color: var(--accent); }
  .wrap {
    flex: 1; max-width: 640px; margin: 0 auto; width: 100%;
    padding: 76px 22px 60px; display: flex; flex-direction: column;
    align-items: center; text-align: center;
  }
  .date { font-size: 14px; color: var(--muted); letter-spacing: .1em; margin-bottom: 8px; }
  .eyebrow {
    font-family: 'Gowun Batang', serif; font-size: 15px; color: var(--accent);
    letter-spacing: .25em; margin-bottom: 36px; position: relative;
  }
  .eyebrow::after { content: ""; display: block; width: 40px; height: 1px; background: var(--accent); margin: 18px auto 0; opacity: .5; }
  .verse {
    font-family: 'Gowun Batang', serif; font-size: clamp(21px, 5vw, 30px);
    line-height: 1.85; font-weight: 400; letter-spacing: -0.01em;
    margin-bottom: 30px; word-break: keep-all; animation: fade 1.1s ease both;
  }
  .ref { font-size: 16px; color: var(--accent); font-weight: 600; letter-spacing: .06em; margin-bottom: 40px; animation: fade 1.1s ease .25s both; }
  @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .comic-label { font-family: 'Gaegu', cursive; font-size: 17px; color: var(--accent); margin-bottom: 14px; letter-spacing: .05em; }
  .comic { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 460px; margin: 0 auto 16px; animation: fade 1.1s ease .4s both; }
  .panel {
    position: relative; aspect-ratio: 1 / 1; border-radius: 14px;
    border: 2px solid #d8cdb8; background: var(--card); overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 12px; box-shadow: 0 4px 14px rgba(120,100,60,0.08);
  }
  .panel .num { position: absolute; top: 8px; left: 10px; font-family: 'Gaegu', cursive; font-size: 15px; font-weight: 700; color: #c4b89c; }
  .panel .scene { font-size: clamp(34px, 11vw, 50px); line-height: 1; margin-bottom: 8px; }
  .panel .bubble { font-family: 'Gaegu', cursive; font-size: 14.5px; line-height: 1.35; color: var(--ink); background: #fff; border: 1.5px solid #e3dac6; border-radius: 12px; padding: 7px 10px; max-width: 95%; word-break: keep-all; }
  .panel .cap { font-family: 'Gaegu', cursive; font-size: 13px; color: var(--muted); margin-top: 6px; word-break: keep-all; }
  .comic-none { font-size: 13px; color: var(--muted); margin: 6px 0 24px; opacity: .8; font-family: 'Gaegu', cursive; }
  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 26px; }
  button {
    font-family: 'Noto Serif KR', serif; font-size: 14px; color: var(--ink);
    background: var(--card); border: 1px solid var(--line); border-radius: 999px;
    padding: 12px 22px; cursor: pointer; letter-spacing: .04em; transition: all .15s;
    box-shadow: 0 2px 10px rgba(120,100,60,0.06);
  }
  button:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  .note { margin-top: 36px; font-size: 12.5px; color: var(--muted); line-height: 1.8; max-width: 400px; opacity: .85; }
  footer { text-align: center; padding: 22px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--line); }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <a class="back" href="/">← U-SOL</a>
  <div class="wrap">
    <div class="date" id="date">—</div>
    <div class="eyebrow">오늘의 말씀</div>
    <blockquote class="verse" id="verse">…</blockquote>
    <div class="ref" id="ref"></div>
    <div id="comicWrap" style="width:100%;"></div>
    <div class="actions">
      <button id="todayBtn">오늘의 말씀</button>
      <button id="nextBtn">다른 말씀 보기</button>
      <button id="copyBtn">복사하기</button>
    </div>
    <p class="note">매일 한 구절이 날짜에 따라 잠잠히 바뀝니다. 어떤 말씀에는 실생활 네 컷 만화가 함께해요.</p>
  </div>
  <footer>© 2026 U-SOL · <a href="/">메인으로</a></footer>
<script>
  const VERSES = [
    { t: "여호와는 나의 목자시니 내게 부족함이 없으리로다", r: "시편 23:1",
      comic: [
        { e: "😟", b: "또 옆집은 새 차 샀네…", c: "남과 비교하던 아침" },
        { e: "📱", b: "부럽다 부러워", c: "끝없는 스크롤" },
        { e: "☕", b: "어? 나도 가진 게 많잖아", c: "문득 둘러보니" },
        { e: "😌", b: "부족함이 없네, 정말", c: "마음이 채워진 저녁" }
      ] },
    { t: "수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라", r: "마태복음 11:28",
      comic: [
        { e: "😮‍💨", b: "할 일이 산더미야…", c: "야근하는 밤" },
        { e: "🎒", b: "어깨가 너무 무거워", c: "혼자 짊어진 짐" },
        { e: "🙏", b: "잠깐 내려놓자", c: "잠시 멈춰서" },
        { e: "😴", b: "이제야 좀 쉬겠다", c: "맡기고 나니 평안" }
      ] },
    { t: "두려워하지 말라 내가 너와 함께 함이라 놀라지 말라 나는 네 하나님이 됨이라", r: "이사야 41:10",
      comic: [
        { e: "😰", b: "내일 발표 망치면 어쩌지", c: "불안한 마음" },
        { e: "🌙", b: "잠도 안 와…", c: "뒤척이는 밤" },
        { e: "💪", b: "혼자가 아니야", c: "함께하심을 떠올리며" },
        { e: "🌅", b: "할 수 있어!", c: "용기를 얻은 아침" }
      ] },
    { t: "범사에 감사하라 이것이 그리스도 예수 안에서 너희를 향하신 하나님의 뜻이니라", r: "데살로니가전서 5:18",
      comic: [
        { e: "😤", b: "버스도 놓치고 최악이야", c: "꼬인 출근길" },
        { e: "☔", b: "비까지 오네…", c: "설상가상" },
        { e: "🤝", b: "우산 같이 쓰실래요?", c: "낯선 이의 친절" },
        { e: "😊", b: "오늘도 감사한 일이 있네", c: "마음이 따뜻해진 하루" }
      ] },
    { t: "내게 능력 주시는 자 안에서 내가 모든 것을 할 수 있느니라", r: "빌립보서 4:13",
      comic: [
        { e: "😣", b: "이건 도저히 못 하겠어", c: "벽에 부딪힌 날" },
        { e: "📚", b: "포기할까…", c: "흔들리는 마음" },
        { e: "🔥", b: "다시 한 번 해보자", c: "힘을 내어" },
        { e: "🎉", b: "결국 해냈다!", c: "끝까지 간 보람" }
      ] },
    { t: "너희 염려를 다 주께 맡기라 이는 그가 너희를 돌보심이라", r: "베드로전서 5:7",
      comic: [
        { e: "🤔", b: "이것도 걱정 저것도 걱정", c: "생각이 많은 밤" },
        { e: "🌀", b: "머릿속이 빙글빙글", c: "끝없는 염려" },
        { e: "✍️", b: "걱정을 적어서 맡기자", c: "하나씩 내려놓기" },
        { e: "🕊️", b: "한결 가벼워졌어", c: "평안을 되찾은 마음" }
      ] }
  ];
  const dateEl = document.getElementById('date');
  const verseEl = document.getElementById('verse');
  const refEl = document.getElementById('ref');
  const comicWrap = document.getElementById('comicWrap');
  function dayIndex(d) {
    const days = Math.floor(d.getTime() / 86400000);
    return ((days % VERSES.length) + VERSES.length) % VERSES.length;
  }
  function renderComic(v) {
    if (!v.comic) { comicWrap.innerHTML = '<div class="comic-none">— 이 말씀의 만화는 곧 추가됩니다 —</div>'; return; }
    let panels = v.comic.map((p, i) => `
      <div class="panel">
        <span class="num">${i+1}</span>
        <div class="scene">${p.e}</div>
        <div class="bubble">${p.b}</div>
        <div class="cap">${p.c}</div>
      </div>`).join('');
    comicWrap.innerHTML = `<div class="comic-label">✏️ 오늘의 네 컷</div><div class="comic">${panels}</div>`;
  }
  function showVerse(i) {
    const v = VERSES[i];
    verseEl.style.animation = 'none'; refEl.style.animation = 'none';
    void verseEl.offsetWidth;
    verseEl.textContent = v.t; refEl.textContent = v.r;
    verseEl.style.animation = ''; refEl.style.animation = '';
    renderComic(v);
  }
  function showToday() {
    const now = new Date();
    const days = ['일','월','화','수','목','금','토'];
    dateEl.textContent = `${now.getFullYear()}. ${now.getMonth()+1}. ${now.getDate()}. (${days[now.getDay()]})`;
    showVerse(dayIndex(now));
  }
  document.getElementById('todayBtn').addEventListener('click', showToday);
  document.getElementById('nextBtn').addEventListener('click', () => showVerse(Math.floor(Math.random() * VERSES.length)));
  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = `${verseEl.textContent} (${refEl.textContent})`;
    navigator.clipboard?.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      const old = btn.textContent; btn.textContent = '복사됨';
      setTimeout(() => btn.textContent = old, 1400);
    });
  });
  showToday();
</script>
</body>
</html>
