  const card = document.getElementById('card');
  const modeLabel = document.getElementById('modeLabel');
  const termEl = document.getElementById('term');
  const koTermEl = document.getElementById('koTerm');
  const tagEl = document.getElementById('tag');
  const summaryEl = document.getElementById('summary');
  const exBodyEl = document.getElementById('exBody');
  const whyBodyEl = document.getElementById('whyBody');
  const progressEl = document.getElementById('progress');
  const todayBtn = document.getElementById('todayBtn');
  const nextBtn = document.getElementById('nextBtn');
  const todayEl = document.getElementById('today');

  const days = ['일','월','화','수','목','금','토'];
  const now = new Date();
  todayEl.textContent = `${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;

  function todayIndex() {
    const d = Math.floor(Date.now() / 86400000);
    return ((d % TOPICS.length) + TOPICS.length) % TOPICS.length;
  }

  let currentIdx = todayIndex();

  function render(idx, today) {
    card.classList.add('swap');
    setTimeout(() => {
      const t = TOPICS[idx];
      modeLabel.textContent = today ? '오늘의 개념' : '다른 개념';
      termEl.textContent = t.term;
      koTermEl.textContent = t.ko;
      tagEl.textContent = t.tag;
      summaryEl.textContent = t.summary;
      exBodyEl.textContent = t.ex;
      whyBodyEl.textContent = t.why;
      progressEl.textContent = `${idx + 1} / ${TOPICS.length}`;
      card.classList.remove('swap');
    }, 180);
  }

  render(currentIdx, true);

  todayBtn.addEventListener('click', () => {
    currentIdx = todayIndex();
    render(currentIdx, true);
  });

  nextBtn.addEventListener('click', () => {
    let next;
    do { next = Math.floor(Math.random() * TOPICS.length); }
    while (next === currentIdx && TOPICS.length > 1);
    currentIdx = next;
    render(currentIdx, currentIdx === todayIndex());
  });
