<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="오늘의 여행지 — 국내외 명소 30곳에서 매일 하나씩, 그 도시의 매력 포인트와 재미있는 사실, 가볼 만한 이유를 한 페이지에.">
<meta name="theme-color" content="#eaf4fb">
<title>오늘의 여행지 · U-SOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eaf4fb; --bg2: #fff8ec;
    --ink: #1f2733; --muted: #6b7686;
    --line: #dee7f1; --card: #ffffff;
    --sky: #3a8dde; --sky-soft: #d6e7f8;
    --sun: #f4a13a; --sun-soft: #ffe8c8;
    --leaf: #4aa376; --leaf-soft: #d8efe1;
    --shadow: 0 1px 2px rgba(31,39,51,0.04), 0 6px 20px rgba(31,39,51,0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 0% 0%, #fff3df 0%, transparent 45%),
      radial-gradient(ellipse at 100% 0%, #d9ecfb 0%, transparent 50%),
      linear-gradient(180deg, var(--bg) 0%, #ffffff 70%, var(--bg2) 100%);
    color: var(--ink);
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  .back {
    position: fixed; top: 16px; left: 18px;
    color: var(--muted); text-decoration: none; font-size: 13.5px;
    letter-spacing: .02em; z-index: 5;
    background: rgba(255,255,255,0.7); backdrop-filter: blur(6px);
    padding: 6px 12px; border-radius: 999px;
    border: 1px solid var(--line);
  }
  .back:hover { color: var(--sky); border-color: var(--sky); }
  .wrap { max-width: 760px; margin: 0 auto; padding: 72px 20px 60px; }

  .eyebrow {
    font-family: 'Fraunces', serif; font-style: italic; font-weight: 600;
    font-size: 14px; letter-spacing: .04em;
    color: var(--sky); text-align: center; margin-bottom: 6px;
  }
  .title-row {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-bottom: 4px;
  }
  h1 {
    font-family: 'Fraunces', serif; font-weight: 900;
    font-size: clamp(34px, 6.4vw, 48px); line-height: 1.05;
    letter-spacing: -0.02em; text-align: center;
  }
  h1 .accent { color: var(--sun); }
  .lede {
    text-align: center; color: var(--muted); font-size: 14px;
    max-width: 520px; margin: 12px auto 22px; line-height: 1.75;
    word-break: keep-all;
  }
  .date-strip {
    display: flex; gap: 8px; justify-content: center; align-items: center;
    margin-bottom: 26px; flex-wrap: wrap;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 999px; padding: 6px 13px; font-size: 12.5px;
    box-shadow: var(--shadow);
  }
  .chip .k { color: var(--muted); }
  .chip .v { font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
  .chip .dot-sky { width: 7px; height: 7px; border-radius: 50%; background: var(--sky); }
  .chip .dot-sun { width: 7px; height: 7px; border-radius: 50%; background: var(--sun); }

  /* hero card */
  .hero {
    position: relative;
    background: var(--card); border: 1px solid var(--line); border-radius: 24px;
    overflow: hidden; box-shadow: var(--shadow);
    animation: fade .55s ease both;
  }
  @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .hero-banner {
    position: relative; padding: 28px 24px 22px;
    background: linear-gradient(135deg, var(--sky) 0%, #6fb0e8 60%, var(--sun) 130%);
    color: #fff; overflow: hidden;
  }
  .hero-banner::before {
    content: ""; position: absolute; right: -40px; top: -40px;
    width: 180px; height: 180px; border-radius: 50%;
    background: rgba(255,255,255,0.18); filter: blur(2px);
  }
  .hero-banner::after {
    content: ""; position: absolute; right: 40px; bottom: -60px;
    width: 140px; height: 140px; border-radius: 50%;
    background: rgba(255,255,255,0.12);
  }
  .region-tag {
    position: relative; z-index: 1;
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.22); backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 999px; padding: 5px 11px;
    font-size: 12px; font-weight: 700; letter-spacing: .06em;
  }
  .place-name {
    position: relative; z-index: 1;
    font-family: 'Fraunces', serif; font-weight: 900;
    font-size: clamp(32px, 6.8vw, 46px); line-height: 1.05;
    margin-top: 14px; letter-spacing: -0.02em;
    text-shadow: 0 2px 14px rgba(0,0,0,0.12);
  }
  .place-sub {
    position: relative; z-index: 1;
    font-size: 14px; opacity: 0.94; margin-top: 8px;
    font-weight: 500; letter-spacing: .02em;
  }
  .place-emoji {
    position: absolute; right: 20px; top: 18px; z-index: 1;
    font-size: 44px; line-height: 1; opacity: 0.95;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15));
  }

  .hero-body { padding: 22px 24px 24px; }
  .lead {
    font-size: 15.5px; line-height: 1.8; word-break: keep-all;
    color: var(--ink); margin-bottom: 18px;
  }
  .lead strong { color: var(--sky); font-weight: 700; }

  .section { margin-top: 18px; }
  .section-label {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Fraunces', serif; font-weight: 700; font-style: italic;
    font-size: 13px; letter-spacing: .04em;
    color: var(--sky); margin-bottom: 10px;
  }
  .section-label.sun { color: var(--sun); }
  .section-label.leaf { color: var(--leaf); }
  .section-label .bar { width: 18px; height: 2px; background: currentColor; border-radius: 2px; opacity: .55; }

  .points {
    display: flex; flex-direction: column; gap: 10px;
  }
  .point {
    display: flex; gap: 12px; align-items: flex-start;
    background: var(--sky-soft); border-radius: 14px;
    padding: 12px 14px;
  }
  .point.sun { background: var(--sun-soft); }
  .point.leaf { background: var(--leaf-soft); }
  .point .ico {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 16px; box-shadow: 0 1px 4px rgba(31,39,51,0.06);
    margin-top: 1px;
  }
  .point .txt { font-size: 14.5px; line-height: 1.7; word-break: keep-all; flex: 1; }
  .point .txt b { font-weight: 700; }

  .fact-card {
    background: linear-gradient(135deg, #fffbf2 0%, #fff5e2 100%);
    border: 1px dashed #f0c98a; border-radius: 14px;
    padding: 14px 16px;
  }
  .fact-card .ftxt { font-size: 14.5px; line-height: 1.75; word-break: keep-all; color: var(--ink); }
  .fact-card .ftxt b { color: var(--sun); font-weight: 700; }

  .why {
    background: linear-gradient(180deg, #f3faf6 0%, #e8f4ec 100%);
    border-left: 3px solid var(--leaf);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 14.5px; line-height: 1.8; word-break: keep-all;
  }
  .why b { color: var(--leaf); font-weight: 700; }

  /* tags */
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
  .tag {
    font-size: 12px; color: var(--muted);
    background: #f4f7fb; border: 1px solid var(--line);
    border-radius: 999px; padding: 4px 10px;
  }

  /* actions */
  .actions {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    margin-top: 22px;
  }
  .btn {
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700;
    background: var(--card); color: var(--ink);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 11px 20px; cursor: pointer; letter-spacing: .01em;
    transition: all .15s; box-shadow: var(--shadow);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { transform: translateY(-2px); border-color: var(--sky); color: var(--sky); }
  .btn:active { transform: translateY(0); }
  .btn.primary { background: var(--sky); color: #fff; border-color: var(--sky); }
  .btn.primary:hover { background: #2776c6; border-color: #2776c6; color: #fff; }
  .btn .em { font-size: 15px; }

  /* footer hint */
  .hint {
    text-align: center; color: var(--muted); font-size: 12.5px;
    margin-top: 22px; letter-spacing: .02em;
  }
  .hint b { color: var(--sky); font-weight: 700; }

  /* mini grid of all destinations */
  .all-section {
    margin-top: 36px; padding-top: 28px;
    border-top: 1px dashed var(--line);
  }
  .all-title {
    text-align: center; font-family: 'Fraunces', serif; font-weight: 700;
    font-size: 18px; margin-bottom: 6px;
  }
  .all-sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .mini-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }
  .mini {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 12px; cursor: pointer; text-align: left;
    transition: all .15s; font-family: inherit;
  }
  .mini:hover { border-color: var(--sky); transform: translateY(-2px); box-shadow: var(--shadow); }
  .mini.active { border-color: var(--sky); background: var(--sky-soft); }
  .mini .em { font-size: 18px; }
  .mini .nm { font-size: 13.5px; font-weight: 700; margin-top: 4px; line-height: 1.3; }
  .mini .rg { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>

<a class="back" href="/">← 홈으로</a>

<div class="wrap">
  <div class="eyebrow">today's destination</div>
  <div class="title-row">
    <h1>오늘의 <span class="accent">여행지</span></h1>
  </div>
  <p class="lede">국내외 명소 30곳을 매일 하나씩 골라드려요. 오늘은 어디가 당첨됐을까요?</p>

  <div class="date-strip">
    <span class="chip"><span class="dot-sky"></span><span class="k">오늘</span><span class="v" id="todayDate">—</span></span>
    <span class="chip"><span class="dot-sun"></span><span class="k">총</span><span class="v" id="totalCount">30</span><span class="k">곳</span></span>
    <span class="chip"><span class="k">#</span><span class="v" id="placeNo">—</span></span>
  </div>

  <article class="hero">
    <div class="hero-banner">
      <span class="region-tag" id="regionTag">—</span>
      <div class="place-emoji" id="placeEmoji">🌍</div>
      <h2 class="place-name" id="placeName">여행지를 불러오는 중…</h2>
      <div class="place-sub" id="placeSub">—</div>
    </div>

    <div class="hero-body">
      <p class="lead" id="placeLead">잠시만 기다려주세요.</p>

      <div class="section">
        <div class="section-label"><span class="bar"></span>매력 포인트</div>
        <div class="points" id="pointsList"></div>
      </div>

      <div class="section">
        <div class="section-label sun"><span class="bar"></span>재미있는 사실</div>
        <div class="fact-card">
          <p class="ftxt" id="factText">—</p>
        </div>
      </div>

      <div class="section">
        <div class="section-label leaf"><span class="bar"></span>가볼 만한 이유</div>
        <p class="why" id="whyText">—</p>
      </div>

      <div class="tags" id="tagList"></div>
    </div>
  </article>

  <div class="actions">
    <button class="btn primary" id="randomBtn"><span class="em">🎲</span> 다른 여행지 보기</button>
    <button class="btn" id="todayBtn"><span class="em">📅</span> 오늘의 여행지로</button>
  </div>

  <p class="hint">매일 자정에 새로 갱신돼요 — 30곳을 순환하며 한 곳씩 보여드립니다.</p>

  <div class="all-section">
    <div class="all-title">전체 여행지 30곳</div>
    <div class="all-sub">눌러서 바로 보기</div>
    <div class="mini-grid" id="miniGrid"></div>
  </div>
</div>

const place = document.getElementById('placeName');
const placeSub = document.getElementById('placeSub');
const placeEmoji = document.getElementById('placeEmoji');
const regionTag = document.getElementById('regionTag');
const placeLead = document.getElementById('placeLead');
const pointsList = document.getElementById('pointsList');
const factText = document.getElementById('factText');
const whyText = document.getElementById('whyText');
const tagList = document.getElementById('tagList');
const todayDate = document.getElementById('todayDate');
const totalCount = document.getElementById('totalCount');
const placeNo = document.getElementById('placeNo');
const miniGrid = document.getElementById('miniGrid');

totalCount.textContent = DESTINATIONS.length;

function dayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function todayIndex() {
  const d = new Date();
  return dayOfYear(d) % DESTINATIONS.length;
}

function fmtDate(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`;
}

function pointClass(i) {
  return ['', 'sun', 'leaf'][i % 3];
}

function render(idx) {
  const p = DESTINATIONS[idx];
  if (!p) return;
  placeNo.textContent = String(idx + 1).padStart(2, '0');
  regionTag.textContent = p.region;
  placeEmoji.textContent = p.emoji;
  place.textContent = p.name;
  placeSub.textContent = p.sub;
  placeLead.innerHTML = p.lead;

  pointsList.innerHTML = '';
  p.points.forEach((pt, i) => {
    const div = document.createElement('div');
    div.className = 'point ' + pointClass(i);
    div.innerHTML = `<div class="ico">${pt.ico}</div><div class="txt">${pt.txt}</div>`;
    pointsList.appendChild(div);
  });

  factText.innerHTML = p.fact;
  whyText.innerHTML = p.why;

  tagList.innerHTML = '';
  (p.tags || []).forEach(t => {
    const s = document.createElement('span');
    s.className = 'tag';
    s.textContent = '#' + t;
    tagList.appendChild(s);
  });

  document.querySelectorAll('.mini').forEach((m, i) => {
    m.classList.toggle('active', i === idx);
  });

  document.querySelector('.hero').style.animation = 'none';
  void document.querySelector('.hero').offsetWidth;
  document.querySelector('.hero').style.animation = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderMiniGrid() {
  DESTINATIONS.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'mini';
    btn.innerHTML = `<div class="em">${p.emoji}</div><div class="nm">${p.name}</div><div class="rg">${p.region}</div>`;
    btn.addEventListener('click', () => render(i));
    miniGrid.appendChild(btn);
  });
}

document.getElementById('randomBtn').addEventListener('click', () => {
  const current = DESTINATIONS.findIndex((_, i) => document.querySelectorAll('.mini')[i]?.classList.contains('active'));
  let r;
  do { r = Math.floor(Math.random() * DESTINATIONS.length); } while (r === current && DESTINATIONS.length > 1);
  render(r);
});

document.getElementById('todayBtn').addEventListener('click', () => {
  render(todayIndex());
});

todayDate.textContent = fmtDate(new Date());
renderMiniGrid();
render(todayIndex());
</script>
